              const isCheck=checkedKingPos&&checkedKingPos[0]===r&&checkedKingPos[1]===c;
              const isFlash=aiFlash&&aiFlash[0]===r&&aiFlash[1]===c;
              const isRev=false; // reversing is now a board-level overlay, not per-cell
              const isThreatened = showOverlays && threatened.has(`${r},${c}`) && piece?.color==='w' && !isSel;
              const isBlunderDest = showOverlays && isDest && blunderDests.has(`${r},${c}`);
              const isHintFrom = hint && hint.move.from[0]===r && hint.move.from[1]===c;
              const isHintTo = hint && hint.move.to[0]===r && hint.move.to[1]===c;

              let bg=isLight?'#00aaff':'#1a5cbf';
              if (isLast) bg=isLight?'#33bbff':'#2266d4';
              if (isSel) bg='#ff5e9988';
              if (isHintFrom) bg='#22d3a055';
              if (isHintTo) bg='#22d3a088';
              if (isFlash) bg=theme.gold+'cc';
              if (isCheck) bg=theme.danger+'cc';
              if (isRev) bg=theme.danger;

              return (
                <div key={i} onClick={()=>handleSquare(r,c)} style={{width:cellSize,height:cellSize,background:bg,display:'flex',alignItems:'center',justifyContent:'center',cursor:turn==='w'&&!quiz?'pointer':'default',position:'relative',transition:'background 0.15s',userSelect:'none',WebkitUserSelect:'none'}}>
                  {/* Threat indicator — small red corner dot on your pieces under attack */}
                  {isThreatened && <div style={{position:'absolute',top:2,right:2,width:6,height:6,borderRadius:'50%',background:theme.danger,zIndex:2}}/>}
                  {/* Blunder warning — orange ring on dangerous destinations */}
                  {isBlunderDest && <div style={{position:'absolute',inset:1,borderRadius:2,border:`2px solid ${theme.gold}`,pointerEvents:'none',zIndex:2}}/>}
                  {isDest&&!piece&&<div style={{width:'33%',height:'33%',borderRadius:'50%',background:'#ffffff33'}}/>}
                  {isDest&&piece&&piece.color==='b'&&<div style={{position:'absolute',inset:2,borderRadius:'50%',border:'3px solid #ffffff44',pointerEvents:'none'}}/>}
                  {piece&&<ChessPiece color={piece.color} type={piece.type} size={cellSize}/>}
                </div>
              );
            })}
          </div>
          </div>

          {/* Bottom tray: your captured (black pieces you took) */}
          <div style={{display:'flex',flexDirection:'row',alignItems:'center',gap:4,minHeight:28,width:`${cellSize*8+4}px`}}>
            <span style={{fontFamily:theme.fontMono,fontSize:8,color:theme.success,letterSpacing:0.5,marginRight:2,flexShrink:0}}>YOU</span>
            <div style={{display:'flex',flexDirection:'row',flexWrap:'wrap',gap:2,alignItems:'center'}}>
              {captured.w.map((t,i)=>(
                <div key={i} style={{position:'relative',width:22,height:22}}>
                  <img src={`https://lichess1.org/assets/piece/pixel/b${t.toUpperCase()}.svg`} width={20} height={20} style={{opacity:0.95,display:'block',filter:`drop-shadow(0 0 4px ${theme.success}cc) drop-shadow(0 0 2px ${theme.success})`}} alt={t}/>
                </div>
              ))}
              {captured.w.length===0 && <div style={{width:20,height:20,border:`1px dashed ${theme.border}`,borderRadius:3,opacity:0.3}}/>}
            </div>
          </div>
        </div>
        {/* Coach message */}
        {coachMsg && (
          <div style={{background:theme.surface,border:`1px solid ${C}44`,borderRadius:10,padding:'8px 14px',maxWidth:320,fontSize:12,color:coachMsg.startsWith('⚠')?theme.gold:coachMsg.startsWith('✓')||coachMsg.startsWith('♔')||coachMsg.startsWith('♞')||coachMsg.startsWith('♟')?theme.success:theme.text,lineHeight:1.5,textAlign:'center'}}>
            {coachMsg}
          </div>
        )}
        {/* Legend / overlay toggle */}
        {turn==='w' && !gameOver && (
          <div style={{display:'flex',gap:12,fontSize:10,color:theme.textMuted,alignItems:'center'}}>
            <span style={{opacity:showOverlays?1:0.35,transition:'opacity 0.15s'}}><span style={{display:'inline-block',width:7,height:7,borderRadius:'50%',background:theme.danger,marginRight:4,verticalAlign:'middle'}}/>Under attack</span>
            <span style={{opacity:showOverlays?1:0.35,transition:'opacity 0.15s'}}><span style={{display:'inline-block',width:10,height:10,border:`2px solid ${theme.gold}`,marginRight:4,verticalAlign:'middle'}}/>Risky square</span>
            <button onClick={()=>setShowOverlays(v=>!v)} style={{background:'none',border:`1px solid ${showOverlays?C:theme.border}`,borderRadius:20,padding:'2px 8px',cursor:'pointer',color:showOverlays?C:theme.textMuted,fontFamily:theme.fontMono,fontSize:9,letterSpacing:1,transition:'all 0.15s'}}>
              {showOverlays ? 'ON' : 'OFF'}
            </button>
            <span style={{opacity:showCoachTips?1:0.35,transition:'opacity 0.15s'}}>💬 Tips</span>
            <button onClick={()=>{ setShowCoachTips(v=>{ if(v) setCoachMsg(''); return !v; }); }} style={{background:'none',border:`1px solid ${showCoachTips?C:theme.border}`,borderRadius:20,padding:'2px 8px',cursor:'pointer',color:showCoachTips?C:theme.textMuted,fontFamily:theme.fontMono,fontSize:9,letterSpacing:1,transition:'all 0.15s'}}>
              {showCoachTips ? 'ON' : 'OFF'}
            </button>
          </div>
        )}
        {/* Hint */}
        {turn==='w' && !gameOver && (
          <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:6}}>
            {hint ? (() => {
              const labelColors = { 'FORCED MATE':'#ff4488', 'WINNING TACTIC':theme.danger, 'GOOD MOVE':theme.success, 'SOLID MOVE':C, 'BEST AVAILABLE':theme.textMuted };
              const conceptLabel = { label: hint.label || 'SUGGESTION', color: labelColors[hint.label] || C };
              const fromSq = toSq(hint.move.from[0], hint.move.from[1]);
              const toSq2  = toSq(hint.move.to[0],   hint.move.to[1]);
              return (
                <div style={{background:theme.surface,border:`1px solid ${conceptLabel.color}44`,borderRadius:10,padding:'10px 14px',maxWidth:300,width:'100%',lineHeight:1.5}}>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:6}}>
                    <span style={{fontFamily:theme.fontMono,fontSize:9,color:conceptLabel.color,letterSpacing:1.5,fontWeight:700}}>{conceptLabel.label}</span>
                    <span style={{fontFamily:theme.fontMono,fontSize:11,color:'#fff',background:conceptLabel.color+'33',borderRadius:5,padding:'2px 7px',letterSpacing:1}}>{fromSq} → {toSq2}</span>
                  </div>
                  <div style={{fontSize:12,color:theme.text,lineHeight:1.6}}>{hint.reason}</div>
                </div>
              );
            })() : (
              <button onClick={()=>{
                setHintLoading(true);
                setTimeout(()=>{
                  const h = getHintMove(game);
                  if (h) { setHint(h); setHintsUsed(n=>n+1); setCoachMsg(''); }
                  setHintLoading(false);
                }, 50);
              }} disabled={hintLoading} style={{background:hintLoading?C+'33':'none',border:`1px solid ${hintLoading?C+'99':C+'55'}`,borderRadius:8,color:hintLoading?C:C,fontFamily:theme.fontMono,fontSize:11,padding:'5px 14px',cursor:hintLoading?'wait':'pointer',letterSpacing:1,transition:'all 0.15s'}}>
                {hintLoading ? '⏳ Computing...' : `💡 HINT ${hintsUsed>0?`(${hintsUsed} used)`:''}`}
              </button>
            )}
          </div>
        )}
        <div style={{fontFamily:theme.fontMono,fontSize:11,color:theme.textMuted,letterSpacing:1,textAlign:'center'}}>
          {gameOver?(
            <div style={{display:'flex',flexDirection:'column',gap:10,alignItems:'center'}}>
              <div style={{color:gameOver==='white_wins'?theme.success:theme.danger,fontSize:14,fontWeight:700}}>
                {gameOver==='white_wins'?'♔ You win!':gameOver==='black_wins'?'♚ Opponent wins':'½ Draw'}
              </div>
              <button onClick={newGame} style={{background:C,border:'none',borderRadius:8,color:'#fff',fontFamily:theme.fontMono,fontSize:12,padding:'8px 24px',cursor:'pointer',letterSpacing:1}}>NEW GAME</button>
            </div>
          ):turn==='w'?'● YOUR TURN (WHITE)':turn==='winback'?'🛡️ WIN IT BACK!':'○ OPPONENT THINKING…'}
        </div>
        <div style={{fontSize:11,color:theme.textMuted+'99',textAlign:'center',maxWidth:300,lineHeight:1.7}}>
          Capture → define a word to keep it{'\n'}AI captures → answer a harder word to win it back
        </div>
      </div>
      {quiz&&<ChessVocabQuiz word={quiz.word.word||quiz.word} context={quiz.context} timeLimit={quiz.timeLimit} onResult={quiz.onResult}/>}
      {winBackQuiz&&<ChessVocabQuiz word={winBackQuiz.word.word||winBackQuiz.word} context={winBackQuiz.context} timeLimit={winBackQuiz.timeLimit} onResult={winBackQuiz.onResult} isHard={true}/>}
      <CelebrationCanvas />
      <ExplodeSVG />
    </div>
  );
}



// ─── ONBOARDING SCREEN ────────────────────────────────────────────────────────
function OnboardingScreen({ onDone }) {
  const [step, setStep] = React.useState(0);
  const [selectedProfile, setSelectedProfile] = React.useState('sat');

  const isLast = step === 2;

  const titles = ["WELCOME", "CHOOSE YOUR MODE", "HOW IT WORKS"];

  return (
    <div style={{ maxWidth: 820, margin: '0 auto', height: '100dvh', display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', background: theme.bg, padding: '32px 24px', textAlign: 'center', position: 'relative' }}>
      {/* Step dots */}
      <div style={{ display: 'flex', gap: 8, marginBottom: 40 }}>
        {[0,1,2].map(i => (
          <div key={i} style={{ width: 8, height: 8, borderRadius: 0, background: i === step ? '#00e5ff' : theme.border, transition: 'background 0.3s' }} />
        ))}
      </div>

      {/* Content */}
      <div className="fadeIn" key={step} style={{ maxWidth: 420, width: '100%' }}>
        <div style={{ fontFamily: "'Press Start 2P', monospace", fontSize: 14, color: '#00e5ff', letterSpacing: 3, marginBottom: 32, filter: 'drop-shadow(0 0 10px rgba(0,229,255,0.5))' }}>
          {titles[step]}
        </div>

        {step === 0 && (
          <>
            <div style={{ fontSize: 15, color: theme.text, lineHeight: 1.8, marginBottom: 20, fontFamily: theme.fontMono }}>
              Learn vocabulary through 6 arcade-style games. Every correct answer builds toward mastery.
            </div>
            <div style={{ fontSize: 12, color: theme.textMuted, lineHeight: 1.7, padding: '14px 18px', background: theme.surface, borderRadius: 12, border: `1px solid ${theme.border}`, fontFamily: theme.fontMono }}>
              Answer a word correctly in 3+ sessions across 2+ different games to master it.
            </div>
          </>
        )}

        {step === 1 && (
          <>
            <div style={{ fontSize: 13, color: theme.textMuted, lineHeight: 1.7, marginBottom: 24, fontFamily: theme.fontMono }}>
              Pick the mode that matches your goal. You can switch anytime from the home screen.
            </div>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
              {[
                { id: 'sat', label: 'SAT MODE', desc: '~400 high-frequency words verified from real Digital SAT tests. Best if you\'re preparing for the exam.', count: '~399 words' },
                { id: 'vocab', label: 'VOCAB MODE', desc: 'All 494 words including advanced vocabulary. Great for writing, reading, or just building a stronger lexicon.', count: '494 words' },
              ].map(({ id, label, desc, count }) => (
                <button key={id} onClick={() => setSelectedProfile(id)} style={{
                  background: selectedProfile === id ? `color-mix(in srgb, #00e5ff 12%, ${theme.surface})` : theme.surface,
                  border: `2px solid ${selectedProfile === id ? '#00e5ff' : theme.border}`,
                  borderRadius: 12, padding: '16px 18px', cursor: 'pointer', textAlign: 'left',
                  transition: 'all 0.2s',
                }}>
                  <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 6 }}>
                    <span style={{ fontFamily: "'Press Start 2P', monospace", fontSize: 9, color: selectedProfile === id ? '#00e5ff' : theme.textMuted, letterSpacing: 1 }}>{label}</span>
                    <span style={{ fontSize: 10, color: theme.textMuted, fontFamily: theme.fontMono }}>{count}</span>
                  </div>
                  <div style={{ fontSize: 12, color: theme.textMuted, lineHeight: 1.5, fontFamily: theme.fontMono }}>{desc}</div>
                </button>
              ))}
            </div>
          </>
        )}

        {step === 2 && (
          <>
            <div style={{ fontSize: 15, color: theme.text, lineHeight: 1.8, marginBottom: 20, fontFamily: theme.fontMono }}>
              The games automatically surface words you've seen but haven't mastered yet.
            </div>
            <div style={{ fontSize: 12, color: theme.textMuted, lineHeight: 1.7, padding: '14px 18px', background: theme.surface, borderRadius: 12, border: `1px solid ${theme.border}`, fontFamily: theme.fontMono }}>
              Check your progress anytime via SEE STATS on the home screen.
            </div>
          </>
        )}
      </div>

      {/* Navigation — pinned to bottom */}
      <div style={{ position: 'absolute', bottom: 48, left: 0, right: 0, display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 0 }}>
        <div style={{ display: 'flex', gap: 12 }}>
          {step > 0 && (
            <button onClick={() => setStep(s => s - 1)} style={{ background: 'transparent', border: `1px solid ${theme.border}`, color: theme.textMuted, borderRadius: 10, padding: '10px 20px', cursor: 'pointer', fontFamily: "'Press Start 2P', monospace", fontSize: 9 }}>BACK</button>
          )}
          <button onClick={() => isLast ? onDone(selectedProfile) : setStep(s => s + 1)} style={{
            background: `linear-gradient(135deg, #00e5ff, #00b8cc)`,
            border: 'none', color: '#001a1f', borderRadius: 10,
            padding: '12px 28px', cursor: 'pointer',
            fontFamily: "'Press Start 2P', monospace", fontSize: 9, fontWeight: 400, letterSpacing: 1,
            boxShadow: '0 4px 20px #00e5ff44',
          }}>
            {isLast ? "LET'S PLAY" : "NEXT"}
          </button>
        </div>
      </div>
    </div>
  );
}

// ─── APP ROOT ─────────────────────────────────────────────────────────────────
function App() {
  const [screen, setScreen] = useState("home");
  const [onboarded, setOnboarded] = React.useState(() => !!localStorage.getItem('satarcade_onboarded'));
  const [scores, setScores] = useState({ hangman: 0, crossword: 0, detective: 0, oddoneout: 0, eartrainer: 0, chess: 0, total: 0 });
  const [profile, setProfile] = useState(() => localStorage.getItem('satarcade_profile') || 'sat');
  const activeWords = WORD_BANK.filter(w => profile === 'sat' ? w.tier <= 3 : true);

  // Word mastery: { word: { count: N, games: Set } } — mastered = count>=3 AND games.size>=2
  const [wordStats, setWordStats] = useState(() => {
    try {
      const saved = JSON.parse(localStorage.getItem('word_stats') || '{}');
      // Revive games: stored as arrays in JSON, need to be Sets in memory
      const revived = {};
      Object.entries(saved).forEach(([word, v]) => {
        revived[word] = {
          count: v.count || 0,
          games: new Set(Array.isArray(v.games) ? v.games : []),
        };
      });
      return revived;
    } catch(e) { return {}; }
  });

  const isMastered = (stats) => stats && stats.count >= 3 && stats.games.size >= 2;
  const mastered = new Set(Object.entries(wordStats).filter(([,v]) => isMastered(v)).map(([k]) => k));

  const [masteryToast, setMasteryToast] = useState(null);
  const toastTimer = React.useRef(null);

  const showMasteryToast = (word) => {
    if (toastTimer.current) clearTimeout(toastTimer.current);
    setMasteryToast(word);
    toastTimer.current = setTimeout(() => setMasteryToast(null), 3000);
  };

  const markCorrect = (word, game) => {
    if (!word || !game) return;
    setWordStats(prev => {
      const entry = prev[word] || { count: 0, games: new Set() };
      const wasMastered = isMastered(entry);
      const newGames = new Set(entry.games);
      newGames.add(game);
      const newEntry = { count: entry.count + 1, games: newGames };
      const nowMastered = isMastered(newEntry);
      if (!wasMastered && nowMastered) setTimeout(() => showMasteryToast(word), 400);
      const next = { ...prev, [word]: newEntry };
      // Persist — convert Sets to arrays for JSON
      try {
        const serializable = {};
        Object.entries(next).forEach(([k, v]) => { serializable[k] = { count: v.count, games: [...v.games] }; });
        localStorage.setItem('word_stats', JSON.stringify(serializable));
      } catch(e) {}
      return next;
    });
  };

  const addScore = (game, pts) => {
    setScores(s => ({ ...s, [game]: Math.max(s[game], pts), total: s.total + pts }));
  };

  if (!onboarded) return <OnboardingScreen onDone={(chosenProfile) => {
    localStorage.setItem('satarcade_onboarded', '1');
    localStorage.setItem('satarcade_profile', chosenProfile || 'sat');
    setProfile(chosenProfile || 'sat');
    setOnboarded(true);
  }} />;

  return (
    <>
      <style>{globalStyle}</style>
      <div style={{ minHeight: "100vh", background: theme.bg }}>
        <div style={{ position: "fixed", inset: 0, pointerEvents: "none", overflow: "hidden", zIndex: 0 }}>
          <div style={{ position: "absolute", top: "10%", left: "5%", width: 400, height: 400, borderRadius: "50%", background: `radial-gradient(circle, ${theme.accent}12 0%, transparent 70%)`, filter: "blur(60px)" }} />
          <div style={{ position: "absolute", bottom: "15%", right: "5%", width: 350, height: 350, borderRadius: "50%", background: `radial-gradient(circle, ${theme.gold}10 0%, transparent 70%)`, filter: "blur(50px)" }} />
        </div>
        <div style={{ position: "relative", zIndex: 1 }}>
          {screen === "home" && <HomeScreen onSelect={setScreen} scores={scores} mastered={mastered} wordStats={wordStats} activeWords={activeWords} profile={profile} setProfile={setProfile} />}
          {screen === "stats" && <StatsScreen onBack={() => setScreen("home")} mastered={mastered} wordStats={wordStats} activeWords={activeWords} profile={profile} onReset={() => {
            localStorage.clear();
            window.location.reload();
          }} />}
          {screen === "hangman" && <HangmanGame onBack={() => setScreen("home")} onScore={pts => addScore("hangman", pts)} onCorrect={w => markCorrect(w, "hangman")} wordBank={activeWords} />}
          {screen === "crossword" && <FreeformCrossword onBack={() => setScreen("home")} onScore={pts => addScore("crossword", pts)} onCorrect={w => markCorrect(w, "crossword")} wordBank={activeWords} />}
          {screen === "detective" && <WordDetective onBack={() => setScreen("home")} onScore={pts => addScore("detective", pts)} onCorrect={w => markCorrect(w, "detective")} wordBank={activeWords} />}
          {screen === "oddoneout" && <OddOneOut onBack={() => setScreen("home")} onScore={pts => addScore("oddoneout", pts)} onCorrect={w => markCorrect(w, "oddoneout")} wordBank={activeWords} />}
          {screen === "eartrainer" && <EarTrainer onBack={() => setScreen("home")} onScore={pts => addScore("eartrainer", pts)} onCorrect={w => markCorrect(w, "eartrainer")} wordBank={activeWords} />}
          {screen === "chess" && <VocabChess onBack={() => setScreen("home")} onScore={pts => addScore("chess", pts)} onCorrect={w => markCorrect(w, "chess")} wordBank={activeWords} />}
        </div>
      </div>
      {/* Mastery toast */}
      {masteryToast && ReactDOM.createPortal(
        <div style={{
          position: 'fixed', bottom: 32, left: '50%', transform: 'translateX(-50%)',
          zIndex: 9999, pointerEvents: 'none',
          background: `linear-gradient(135deg, ${theme.accent}, ${theme.gold})`,
          borderRadius: 16, padding: '14px 22px', boxShadow: `0 8px 32px ${theme.accent}66`,
          display: 'flex', alignItems: 'center', gap: 12, minWidth: 240, maxWidth: 320,
          animation: 'fadeIn 0.3s ease',
        }}>
          <span style={{ fontSize: 26 }}>🎓</span>
          <div>
            <div style={{ fontFamily: "'Press Start 2P', monospace", fontSize: 9, fontWeight: 400, letterSpacing: 1, color: '#fff', letterSpacing: 1 }}>{masteryToast} mastered!</div>
            <div style={{ fontSize: 11, color: 'rgba(255,255,255,0.8)', marginTop: 2 }}>Added to your mastered list</div>
          </div>
        </div>,
        document.body
      )}
    </>
  );
}

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
</script>
</body>
