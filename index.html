  { word: "ABERRATION", def: "Something that differs from the norm; a deviation from what is expected", pos: "noun", example: "The sudden snowstorm in April was a weather ___ that surprised even veteran meteorologists." },
  { word: "ABHOR", def: "To hate or detest intensely", pos: "verb", example: "She came to ___ dishonesty after being lied to by someone she deeply trusted." },
  { word: "ABJURE", def: "To reject or renounce, often formally", pos: "verb", example: "Under pressure from the church, the scientist was forced to ___ his theories about the solar system." },

  const shuffled = [...arr].sort(() => Math.random() - 0.5);
  return n === 1 ? shuffled[0] : shuffled.slice(0, n);
}

// ─── COMPONENTS ───────────────────────────────────────────────────────────────

function Btn({ children, onClick, variant = "primary", disabled, style = {}, small }) {
  const base = {
    fontFamily: theme.fontBody,
    fontWeight: 600,
    border: "none",
    cursor: disabled ? "not-allowed" : "pointer",
    borderRadius: 10,
    transition: "all 0.2s",
    display: "inline-flex",
    alignItems: "center",
    gap: 6,
    padding: small ? "8px 16px" : "12px 24px",
    fontSize: small ? 13 : 15,
    opacity: disabled ? 0.45 : 1,
    ...style,
  };
  const variants = {
    primary: { background: `linear-gradient(135deg, ${theme.accent}, #5b3fd4)`, color: "#fff", boxShadow: `0 4px 20px ${theme.accentGlow}` },
    secondary: { background: theme.surface, color: theme.text, border: `1px solid ${theme.border}` },
    gold: { background: `linear-gradient(135deg, #f4c430, #e0a800)`, color: "#1a1400", boxShadow: `0 4px 20px ${theme.goldGlow}` },
    danger: { background: `linear-gradient(135deg, #ff5e7a, #c43050)`, color: "#fff" },
    success: { background: `linear-gradient(135deg, ${theme.success}, #0fa37a)`, color: "#fff" },
    ghost: { background: "transparent", color: theme.accentLight, border: `1px solid ${theme.accent}` },
  };
  return <button style={{ ...base, ...variants[variant] }} onClick={onClick} disabled={disabled}>{children}</button>;
}

function Badge({ children, color = theme.accent }) {
  return (
    <span style={{ background: color + "22", color, border: `1px solid ${color}44`, borderRadius: 6, padding: "3px 10px", fontSize: 12, fontWeight: 600, fontFamily: theme.fontMono }}>
      {children}
    </span>
  );
}

function ProgressBar({ value, max, color = theme.accent }) {
  return (
    <div style={{ background: theme.border, borderRadius: 99, height: 8, overflow: "hidden" }}>
      <div style={{ width: `${Math.min(100, (value / max) * 100)}%`, height: "100%", background: color, borderRadius: 99, transition: "width 0.5s ease" }} />
    </div>
  );
}

            onMouseEnter={e => { e.currentTarget.style.border = `1px solid ${g.color}66`; e.currentTarget.style.transform = "translateY(-2px)"; e.currentTarget.style.boxShadow = `0 6px 24px ${g.color}18`; }}
            onMouseLeave={e => { e.currentTarget.style.border = `1px solid ${theme.border}`; e.currentTarget.style.transform = ""; e.currentTarget.style.boxShadow = ""; }}>
            {/* Subtle color bleed */}
            <div style={{ position: "absolute", top: 0, left: 0, width: 3, height: "100%", background: g.color, borderRadius: "14px 0 0 14px", opacity: 0.8 }} />
            <div style={{ fontSize: 28, flexShrink: 0, width: 52, textAlign: "center", display:'flex', alignItems:'center', justifyContent:'center' }}>
              {g.id === 'chess'
                ? <img src="https://lichess1.org/assets/piece/pixel/wN.svg" width={34} height={34} onLoad={()=>setLoadedIcons(prev=>({...prev,chess:true}))} style={{display:'block',filter:`drop-shadow(0 0 4px ${g.color}88)`,opacity:loadedIcons['chess']?1:0,transition:'opacity 0.2s'}} alt="knight"/>
                : ({hangman:'hangman',crossword:'crossword',detective:'search',oddoneout:'oddoneout',eartrainer:'ear'})[g.id]
                ? <img
                    src={`https://raw.githubusercontent.com/veronicadesalvo/SATarcade/main/${({hangman:'hangman',crossword:'crossword',detective:'search',oddoneout:'oddoneout',eartrainer:'ear'})[g.id]}.png`}
                    width={g.id==='crossword'?34:44} height={g.id==='crossword'?34:44}
                    onLoad={()=>setLoadedIcons(prev=>({...prev,[({hangman:'hangman',crossword:'crossword',detective:'search',oddoneout:'oddoneout',eartrainer:'ear'})[g.id]]:true}))}
                    style={{display:'block',imageRendering:'pixelated',filter:`drop-shadow(0 0 4px ${g.color}88)`,opacity:loadedIcons[({hangman:'hangman',crossword:'crossword',detective:'search',oddoneout:'oddoneout',eartrainer:'ear'})[g.id]]?1:0,transition:'opacity 0.2s'}}
                    alt={g.title}/>
                : g.icon}
            </div>
            <div style={{ flex: 1, minWidth: 0 }}>
              <div style={{ fontFamily: theme.fontMono, fontSize: 14, fontWeight: 700, color: g.color, letterSpacing: 1, textTransform: "uppercase" }}>{g.title}</div>
              <div style={{ fontSize: 12, color: theme.textMuted, marginTop: 2 }}>{g.sub}</div>
            </div>
            {scores[g.id] > 0 && (
              <Badge color={g.color}>{scores[g.id]}</Badge>
            )}
            <span style={{ color: theme.textMuted, fontSize: 14, flexShrink: 0 }}>›</span>
          </div>
        ))}
      </div>
    </div>
  );
}

// ─── PERSISTENT WORD QUEUE ───────────────────────────────────────────────────
// Shuffles all words into a queue stored in localStorage so words cycle through
// the full list across sessions before repeating. Each game gets its own queue.

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function getMastered() {
  try {
    const saved = JSON.parse(localStorage.getItem('word_stats') || '{}');
    return new Set(Object.entries(saved)
      .filter(([, v]) => {
        const gamesCount = Array.isArray(v.games) ? v.games.length : (v.games instanceof Set ? v.games.size : 0);
        return v.count >= 3 && gamesCount >= 2;
      })
      .map(([k]) => k));
  } catch(e) { return new Set(); }
}

function buildWeightedQueue(allWords, mastered) {
  // Mastered words appear ~1/5 as often — still show up, just much less
  const arr = [];
  for (const w of allWords) {
    const slots = mastered && mastered.has(w.word) ? 1 : 5;
    for (let i = 0; i < slots; i++) arr.push(w.word);
  }
  return shuffle(arr);
}

function loadQueue(key, allWords, mastered) {
  try {
    const saved = localStorage.getItem(key);
    if (saved) {
      const { queue, idx } = JSON.parse(saved);
      if (queue && queue.length > 0 && idx >= 0) {
        return { queue, idx };
      }
    }
  } catch(e) {}
  const m = mastered || getMastered();
  return { queue: buildWeightedQueue(allWords, m), idx: 0 };
}

function saveQueue(key, queue, idx) {
  try { localStorage.setItem(key, JSON.stringify({ queue, idx })); } catch(e) {}
}

function getNextWords(key, allWords, count, mastered) {
  const m = mastered || getMastered();
  const wordMap = Object.fromEntries(allWords.map(w => [w.word, w]));
  let { queue, idx } = loadQueue(key, allWords, m);
  const result = [];
  while (result.length < count) {
    if (idx >= queue.length) {
      queue = buildWeightedQueue(allWords, m);
      idx = 0;
    }
    const entry = wordMap[queue[idx]];
    if (entry) result.push(entry);
    idx++;
  }
  saveQueue(key, queue, idx);
  return result;
}

function getNextWord(key, allWords, mastered) {
  return getNextWords(key, allWords, 1, mastered)[0];
}

// ─── HANGMAN ──────────────────────────────────────────────────────────────────
const MAX_WRONG = 6;

function HangmanSVG({ wrong }) {
  const c = theme.danger;
  return (
    <svg width="140" height="140" viewBox="0 0 140 140" style={{ display: "block" }}>
      {/* Gallows */}
      <line x1="20" y1="130" x2="120" y2="130" stroke={theme.border} strokeWidth="3" strokeLinecap="round" />
      <line x1="40" y1="130" x2="40" y2="10" stroke={theme.border} strokeWidth="3" strokeLinecap="round" />
      <line x1="40" y1="10" x2="90" y2="10" stroke={theme.border} strokeWidth="3" strokeLinecap="round" />
      <line x1="90" y1="10" x2="90" y2="28" stroke={theme.border} strokeWidth="3" strokeLinecap="round" />
      {/* Head */}
      {wrong >= 1 && <circle cx="90" cy="38" r="10" stroke={c} strokeWidth="2.5" fill="none" />}
      {/* Body */}
      {wrong >= 2 && <line x1="90" y1="48" x2="90" y2="85" stroke={c} strokeWidth="2.5" strokeLinecap="round" />}
      {/* Left arm */}
      {wrong >= 3 && <line x1="90" y1="58" x2="70" y2="75" stroke={c} strokeWidth="2.5" strokeLinecap="round" />}
      {/* Right arm */}
      {wrong >= 4 && <line x1="90" y1="58" x2="110" y2="75" stroke={c} strokeWidth="2.5" strokeLinecap="round" />}
      {/* Left leg */}
      {wrong >= 5 && <line x1="90" y1="85" x2="70" y2="108" stroke={c} strokeWidth="2.5" strokeLinecap="round" />}
      {/* Right leg */}
      {wrong >= 6 && <line x1="90" y1="85" x2="110" y2="108" stroke={c} strokeWidth="2.5" strokeLinecap="round" />}
    </svg>
  );
}

function HangmanGame({ onBack, onScore, onCorrect }) {
  const [entry, setEntry] = useState(() => getNextWord('hangman_queue', WORD_BANK));
  const [guessed, setGuessed] = useState(new Set());
  const [wrong, setWrong] = useState(0);
  const [status, setStatus] = useState("playing");
  const [streak, setStreak] = useState(0);
  const [shakeKey, setShakeKey] = useState(0);
  const [reveal, setReveal] = useState(false);
  const [clueUsed, setClueUsed] = useState(false);
  const [showClueOffer, setShowClueOffer] = useState(false);
  const [lastWrong, setLastWrong] = useState(0);

  const startNew = useCallback(() => {
    setEntry(getNextWord('hangman_queue', WORD_BANK));
    setGuessed(new Set());
    setWrong(0);
    setStatus("playing");
    setReveal(false);
    setClueUsed(false);
    setShowClueOffer(false);
    setLastWrong(0);
  }, []);

  const word = entry?.word || "";
  const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");
  const uniqueLetters = new Set(word.split(""));
  const correctGuesses = [...guessed].filter(l => uniqueLetters.has(l));
  const solved = word.length > 0 && word.split("").every(l => guessed.has(l));

  useEffect(() => {
    if (solved && status === "playing") {
      const pts = Math.max(10, (MAX_WRONG - wrong) * 20);
      setStatus("won");
      setStreak(s => s + 1);
      onScore(pts);
      onCorrect(entry?.word);
      setShowClueOffer(false);
    } else if (wrong >= MAX_WRONG && status === "playing") {
      setStatus("lost");
      setStreak(0);
      setShowClueOffer(false);
    }
  }, [guessed, wrong]);

  const guess = (l) => {
    if (guessed.has(l) || status !== "playing") return;
    const next = new Set(guessed);
    next.add(l);
    setGuessed(next);
    if (!uniqueLetters.has(l)) {
      setWrong(w => w + 1);
      setShakeKey(k => k + 1);
      // Offer a clue after each wrong guess (only once per word, while not already used)
      if (!clueUsed) setShowClueOffer(true);
    } else {
      setShowClueOffer(false);
    }
  };

  const useClue = () => {
    setClueUsed(true);
    setShowClueOffer(false);
  };

  const displayWord = word.split("").map((l, i) => {
    const shown = guessed.has(l) || reveal;
    const letterColor = solved ? theme.success : guessed.has(l) ? theme.text : "transparent";
    const lineColor = guessed.has(l) ? (solved ? theme.success : theme.accentLight) : theme.border;
    return (
      <span key={i} style={{ display: "inline-flex", flexDirection: "column", alignItems: "center", margin: "0 3px", width: 24 }}>
        <span style={{
          display: "block", width: 24, height: 32, lineHeight: "32px", textAlign: "center",
          fontSize: 22, fontFamily: theme.fontMono, fontWeight: 700,
          color: letterColor, transition: "color 0.3s",
        }}>
          {shown ? l : "\u00A0"}
        </span>
        <span style={{ display: "block", width: 24, height: 2, background: lineColor, borderRadius: 1, transition: "background 0.3s" }} />
      </span>
    );
  });

  // Responsive letter sizing: scale down for long words so they fit on screen
  const letterCount = word.length;
  const letterSize = letterCount > 12 ? 15 : letterCount > 9 ? 18 : 22;
  const letterWidth = letterCount > 12 ? 17 : letterCount > 9 ? 21 : 26;

  return (
    <div className="fadeIn" style={{ maxWidth: 640, margin: "0 auto", padding: "24px 20px" }}>
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 20 }}>
        <Btn variant="ghost" small onClick={onBack}>← Back</Btn>
        <div style={{ fontFamily: "'Press Start 2P', monospace", fontSize: 13, color: "#ff1a5e", textAlign: "center" }}>Hangman</div>
        <Badge color={theme.gold}>Streak: {streak}</Badge>
      </div>

      {entry && (
        <div>
          {/* Row 1: gallows + definition */}
          <div style={{ display: "grid", gridTemplateColumns: "130px 1fr", gap: 16, alignItems: "start", marginBottom: 20 }}>
            <div key={shakeKey} className={wrong > 0 && wrong < MAX_WRONG ? "shake" : ""} style={{ flexShrink: 0 }}>
              <HangmanSVG wrong={wrong} />
              <div style={{ textAlign: "center", marginTop: 2 }}>
                <span style={{ fontFamily: theme.fontMono, fontSize: 13, color: wrong >= MAX_WRONG ? theme.danger : theme.textMuted }}>{wrong}/{MAX_WRONG}</span>
              </div>
            </div>
            <div style={{ background: theme.surfaceHover, border: `1px solid ${theme.border}`, borderRadius: 12, padding: 14 }}>
              <div style={{ fontSize: 11, textTransform: "uppercase", letterSpacing: 2, color: theme.accentLight, marginBottom: 6 }}>Definition</div>
              <div style={{ fontSize: 14, lineHeight: 1.7, color: theme.text, fontStyle: "italic" }}>"{entry.def}"</div>
              <div style={{ marginTop: 6 }}><Badge color={theme.textMuted}>{entry.pos}</Badge></div>
            </div>
          </div>

          {/* Row 2: word display — full width, letters always fixed size */}
          <div style={{ display: "flex", justifyContent: "center", flexWrap: "wrap", rowGap: 8, columnGap: 4, marginBottom: 20, padding: "4px 0" }}>
            {word.split("").map((l, i) => {
              const shown = guessed.has(l) || reveal;
              return (
                <span key={i} style={{ display: "inline-flex", flexDirection: "column", alignItems: "center", width: letterWidth + 6 }}>
                  <span style={{
                    display: "block",
                    width: letterWidth + 6,
                    height: letterSize + 8,
                    lineHeight: `${letterSize + 8}px`,
                    textAlign: "center",
                    fontSize: letterSize,
                    fontFamily: theme.fontMono,
                    fontWeight: 700,
                    color: solved ? theme.success : guessed.has(l) ? theme.text : "transparent",
                    transition: "color 0.3s",
                  }}>
                    {shown ? l : " "}
                  </span>
                  <span style={{ display: "block", width: letterWidth, height: 2, background: guessed.has(l) ? (solved ? theme.success : theme.accentLight) : theme.border, borderRadius: 1, transition: "background 0.3s" }} />
                </span>
              );
            })}
          </div>

          {/* Status banners */}
          {status === "won" && (
            <div className="pop" style={{ textAlign: "center", padding: 14, borderRadius: 12, background: theme.success + "22", border: `1px solid ${theme.success}44`, marginBottom: 16 }}>
              <div style={{ color: theme.success, fontWeight: 700, fontSize: 18 }}>🎉 Correct! +{Math.max(10, (MAX_WRONG - wrong) * 20)} pts</div>
            </div>
          )}
          {status === "lost" && (
            <div style={{ textAlign: "center", padding: 14, borderRadius: 12, background: theme.danger + "22", border: `1px solid ${theme.danger}44`, marginBottom: 16 }}>
              <div style={{ color: theme.danger, fontWeight: 700, fontSize: 18 }}>💀 The word was: <span style={{ fontFamily: theme.fontMono }}>{word}</span></div>
            </div>
          )}

          {/* Clue offer — appears after a wrong guess */}
          {status === "playing" && showClueOffer && !clueUsed && wrong < MAX_WRONG && (
            <div className="fadeIn" style={{
              display: "flex", alignItems: "center", justifyContent: "space-between",
              gap: 10, padding: "10px 14px", borderRadius: 10, marginBottom: 12,
              background: theme.gold + "18", border: `1px solid ${theme.gold}55`,
            }}>
              <span style={{ fontSize: 13, color: theme.text, lineHeight: 1.4 }}>
                💡 <span style={{ color: theme.gold, fontWeight: 700 }}>Need a hint?</span> See the word used in a sentence
              </span>
              <button onClick={useClue} style={{
                flexShrink: 0, padding: "5px 12px", borderRadius: 8, border: `1px solid ${theme.gold}88`,
                background: theme.gold + "22", color: theme.gold, fontWeight: 700, fontSize: 12,
                cursor: "pointer", fontFamily: theme.fontMono, whiteSpace: "nowrap",
              }}>
                Show Hint
              </button>
            </div>
          )}

          {/* Sentence example — shown after clue used */}
          {status === "playing" && clueUsed && entry?.example && (
            <div className="fadeIn" style={{
              padding: "12px 16px", borderRadius: 10, marginBottom: 12,
              background: theme.accent + "14", border: `1px solid ${theme.accent}44`,
            }}>
              <div style={{ fontSize: 11, textTransform: "uppercase", letterSpacing: 2, color: theme.accentLight, marginBottom: 6 }}>
                💡 Example Sentence
              </div>
              <div style={{ fontSize: 14, lineHeight: 1.7, color: theme.text, fontStyle: "italic" }}>
                {entry.example.split("___").map((part, i, arr) => (
                  <span key={i}>
                    {part}
                    {i < arr.length - 1 && (
                      <span style={{
                        display: "inline-flex", alignItems: "center", justifyContent: "center",
                        minWidth: 52, height: 20, background: theme.accent + "33",
                        border: `1px solid ${theme.accent}66`, borderRadius: 4,
                        fontFamily: theme.fontMono, fontSize: 11, fontWeight: 700,
                        color: theme.accentLight, letterSpacing: 3, verticalAlign: "middle",
                        margin: "0 2px",
                      }}>
                        {"_".repeat(Math.min(word.length, 7))}
                      </span>
                    )}
                  </span>
                ))}
              </div>
            </div>
          )}

          {/* Keyboard */}
          {status === "playing" && (
            <div style={{ display: "flex", flexWrap: "wrap", gap: 5, justifyContent: "center" }}>
              {letters.map(l => {
                const used = guessed.has(l);
                const correct = used && uniqueLetters.has(l);
                const wrong_ = used && !uniqueLetters.has(l);
                return (
                  <button key={l} onClick={() => guess(l)} disabled={used}
                    style={{ width: 34, height: 34, borderRadius: 7, border: "none", cursor: used ? "not-allowed" : "pointer", fontFamily: theme.fontMono, fontWeight: 700, fontSize: 13, background: correct ? theme.success + "33" : wrong_ ? theme.danger + "22" : theme.surface, color: correct ? theme.success : wrong_ ? theme.danger : used ? theme.textMuted : theme.text, border: `1px solid ${correct ? theme.success + "66" : wrong_ ? theme.danger + "44" : theme.border}`, transition: "all 0.15s", textDecoration: wrong_ ? "line-through" : "none" }}>
                    {l}
                  </button>
                );
              })}
            </div>
          )}

          {(status === "won" || status === "lost") && (
            <div style={{ display: "flex", gap: 10, justifyContent: "center", marginTop: 12 }}>
              <Btn variant="primary" onClick={startNew}>Next Word →</Btn>
              {status === "lost" && <Btn variant="ghost" small onClick={() => setReveal(true)}>Show Word</Btn>}
            </div>
          )}
        </div>
      )}
    </div>
  );
}

function generateCrossword(wordEntries, targetCount = 8) {
  const GRID = 22;
  const CENTER = Math.floor(GRID / 2);

  // Prefer shorter words (5–8 chars) — they share more letters proportionally
  const candidates = [...wordEntries]
    .sort(() => Math.random() - 0.5)
    .sort((a, b) => {
      const s = w => {
        const l = w.length;
        if (l >= 5 && l <= 8) return 0;
        if (l >= 4 && l <= 10) return 1;
        return 2;
      };
      return s(a.word) - s(b.word);

  const cells = Array.from({ length: GRID }, () => Array(GRID).fill(null));
  const placed = [];

  const countIntersections = (word, row, col, dir) => {
    let count = 0;
    for (let i = 0; i < word.length; i++) {
      const r = dir === 'A' ? row : row + i;
      const c = dir === 'A' ? col + i : col;
      if (cells[r][c] !== null && cells[r][c] === word[i]) count++;
    }

  };

  const canPlace = (word, row, col, dir) => {
    const len = word.length;

      if (col > 0 && cells[row][col - 1] !== null) return false;
      if (col + len < GRID && cells[row][col + len] !== null) return false;
    } else {
      if (row < 0 || row + len > GRID || col < 0 || col >= GRID) return false;
      if (row > 0 && cells[row - 1][col] !== null) return false;
      if (row + len < GRID && cells[row + len][col] !== null) return false;
    }

    for (let i = 0; i < len; i++) {

        return l;
      })();
      const needsNum = (startsAcross && acrossLen >= 2) || (startsDown && downLen >= 2);
      if (needsNum) {
        numberedCells[`${r},${c}`] = num;
        if (startsAcross && acrossLen >= 2) {
          // Find which word this is
          const w = acrossWords.find(w => w.row === r && w.col === c);
          if (w) acrossClues[num] = { word: w.word, clue: getClue(w.word) || w.entry.def, pos: w.entry.pos };
        }
        if (startsDown && downLen >= 2) {
          const w = downWords.find(w => w.row === r && w.col === c);
          if (w) downClues[num] = { word: w.word, clue: getClue(w.word) || w.entry.def, pos: w.entry.pos };
        }
        num++;
      }
    }
  }

  return { grid, rows, cols, numberedCells, acrossClues, downClues };
}

// ─── CROSSWORD COMPONENT ──────────────────────────────────────────────────────
function FreeformCrossword({ onBack, onScore, onCorrect }) {
  const [puzzle, setPuzzle] = useState(null);
  const [userGrid, setUserGrid] = useState({});
  const [selected, setSelected] = useState(null);
  const [dir, setDir] = useState('A');
  const [checked, setChecked] = useState(false);
  const [revealed, setRevealed] = useState({});
  const [puzzleNum, setPuzzleNum] = useState(0);
  const [hintsLeft, setHintsLeft] = useState(3);
  const [hintedLetters, setHintedLetters] = useState(new Set());
  const [wordHintsUsed, setWordHintsUsed] = useState({}); // "num-dir" -> hint string
  const [confirmAction, setConfirmAction] = useState(null); // { type: 'word'|'all', label }
  const inputRef = useRef(null);
  const { celebrate, CelebrationCanvas } = useWinCelebration();


  const generate = useCallback(() => {
    setPuzzle(null);
    setUserGrid({});
    setSelected(null);
    setChecked(false);
    setRevealed({});
    setHintsLeft(3);
    setHintedLetters(new Set());
    setWordHintsUsed({});
    setConfirmAction(null);
    setPuzzleNum(n => n + 1);
    // Run in setTimeout so the "Generating..." screen renders first
    setTimeout(() => {
      let p = null;
      let bestScore = -Infinity;
      const candidateWords = getNextWords('crossword_queue', WORD_BANK, 60);
      for (let attempt = 0; attempt < 8; attempt++) {
        const candidate = generateCrossword(candidateWords, 8);
        if (!candidate) continue;
        const clueCount = Object.keys(candidate.acrossClues).length + Object.keys(candidate.downClues).length;
        if (clueCount < 5) continue;
        const area = candidate.rows * candidate.cols;
        const squareness = Math.abs(candidate.rows - candidate.cols);
        const score = (clueCount * 10) - area * 0.3 - squareness * 5;
        if (score > bestScore) { bestScore = score; p = candidate; }
      }
      // Fallback: try with fewer words if still null
      if (!p) {
        for (let attempt = 0; attempt < 5; attempt++) {
          const candidate = generateCrossword(candidateWords, 5);
          if (!candidate) continue;
          const clueCount = Object.keys(candidate.acrossClues).length + Object.keys(candidate.downClues).length;
          if (clueCount >= 4) { p = candidate; break; }
        }
      }
      setPuzzle(p);
    }, 50);
  }, []);

  useEffect(() => { generate(); }, []);

  const activeClue = useMemo(() => {
    if (!puzzle || !selected) return null;
    const { numberedCells, acrossClues, downClues } = puzzle;
    // Find the clue number for the selected cell in current direction
    let r = selected.r, c = selected.c;
    if (dir === 'A') {
      while (c > 0 && puzzle.grid[r][c - 1] !== null) c--;
    } else {
      while (r > 0 && puzzle.grid[r - 1][c] !== null) r--;
    }
    const num = numberedCells[`${r},${c}`];
    if (!num) return null;
    const clueObj = dir === 'A' ? acrossClues[num] : downClues[num];
    if (!clueObj) return null;
    return { num, ...clueObj, dir };
  }, [puzzle, selected, dir]);

  const handleCellClick = (r, c) => {
    if (!puzzle || puzzle.grid[r][c] === null) return;
    const { numberedCells, acrossClues, downClues, grid, rows, cols } = puzzle;

    // Helper: does this cell belong to a valid clue in a given direction?
    const hasClue = (row, col, d) => {
      let rr = row, cc = col;
      if (d === 'A') { while (cc > 0 && grid[rr][cc - 1] !== null) cc--; }
      else           { while (rr > 0 && grid[rr - 1][cc] !== null) rr--; }
      const n = numberedCells[`${rr},${cc}`];
      return n && (d === 'A' ? !!acrossClues[n] : !!downClues[n]);
    };

    const hasA = hasClue(r, c, 'A');
    const hasD = hasClue(r, c, 'D');

    if (selected && selected.r === r && selected.c === c) {
      // Re-click: toggle only if both directions exist
      if (hasA && hasD) setDir(d => d === 'A' ? 'D' : 'A');
    } else {
      setSelected({ r, c });
      // Auto-pick direction: if current dir has no clue here, switch
      if (hasA && !hasD) setDir('A');
      else if (hasD && !hasA) setDir('D');
      // else both exist — keep current dir
    }
  };

  // Jump to the first cell of a clue when user taps it in the list
  const jumpToClue = (num, dir) => {
    if (!puzzle) return;
    const { numberedCells, rows, cols } = puzzle;
    for (let r = 0; r < rows; r++) {
      for (let c = 0; c < cols; c++) {
        if (numberedCells[`${r},${c}`] === Number(num)) {
          setSelected({ r, c });
          setDir(dir);
          return;
        }
      }
    }
  };

  const advanceCursor = (r, c, d) => {
    if (!puzzle) return;
    const nr = d === 'D' ? r + 1 : r;
    const nc = d === 'A' ? c + 1 : c;
    if (nr < puzzle.rows && nc < puzzle.cols && puzzle.grid[nr][nc] !== null) {
      setSelected({ r: nr, c: nc });
    }
  };

  const retreatCursor = (r, c, d) => {
    if (!puzzle) return;
    const nr = d === 'D' ? r - 1 : r;
    const nc = d === 'A' ? c - 1 : c;
    if (nr >= 0 && nc >= 0 && puzzle.grid[nr][nc] !== null) {
      setSelected({ r: nr, c: nc });
    }
  };

  const handleKey = (e) => {
    if (!selected || !puzzle) return;
    const { r, c } = selected;
    if (e.key === 'Tab') {
      e.preventDefault();
      // Jump to next clue
      return;
    }
    if (e.key === 'Backspace') {
      e.preventDefault();
      const key = `${r},${c}`;
      if (userGrid[key]) {
        setUserGrid(g => { const n = { ...g }; delete n[key]; return n; });
      } else {
        retreatCursor(r, c, dir);
      }
      return;
    }
    if (e.key === 'ArrowRight') { setDir('A'); e.preventDefault(); return; }
    if (e.key === 'ArrowDown') { setDir('D'); e.preventDefault(); return; }
    if (e.key === 'ArrowLeft') { retreatCursor(r, c, 'A'); e.preventDefault(); return; }
    if (e.key === 'ArrowUp') { retreatCursor(r, c, 'D'); e.preventDefault(); return; }
    if (/^[A-Za-z]$/.test(e.key)) {
      e.preventDefault();
      const letter = e.key.toUpperCase();
      setUserGrid(g => ({ ...g, [`${r},${c}`]: letter }));
      advanceCursor(r, c, dir);
    }
  };

  const prevInput = useRef('');
  const handleChange = (e) => {
    if (!selected || !puzzle) return;
    const val = e.target.value;
    const prev = prevInput.current;
    prevInput.current = '';
    e.target.value = '';
    const newChar = val.replace(prev, '').slice(-1).toUpperCase();
    if (/^[A-Z]$/.test(newChar)) {
      const { r, c } = selected;
      setUserGrid(g => ({ ...g, [`${r},${c}`]: newChar }));
      advanceCursor(r, c, dir);
    }
  };

  const checkPuzzle = () => setChecked(c => !c);

  // Get all cells belonging to the currently selected word
  const getActiveWordCells = useCallback(() => {
    if (!puzzle || !selected || !activeClue) return [];
    const { grid, rows, cols } = puzzle;
    const cells = [];
    let r = selected.r, c = selected.c;
    if (dir === 'A') {
      while (c > 0 && grid[r][c - 1] !== null) c--;
      while (c < cols && grid[r][c] !== null) { cells.push({ r, c }); c++; }
    } else {
      while (r > 0 && grid[r - 1][c] !== null) r--;
      while (r < rows && grid[r][c] !== null) { cells.push({ r, c }); r++; }
    }
    return cells;
  }, [puzzle, selected, dir, activeClue]);

  // Word hint: reveal the definition of the active word (already shown in clue bar,
  // so this reveals the actual WORD in text above the grid as a hint)
  const activeWordKey = activeClue ? `${activeClue.num}-${activeClue.dir}` : null;
  const wordHintAvailable = activeWordKey && !(activeWordKey in wordHintsUsed);

  const useWordHint = () => {
    if (!activeWordKey || !wordHintAvailable || !activeClue) return;
    // Find the entry to get the example sentence
    const entry = WORD_BANK.find(e => e.word === activeClue.word);
    let hint = null;
    if (entry?.example) {
      // Show the example sentence with the word blanked out
      hint = entry.example; // already has ___ in place of the word
    } else {
      // Fall back to a different clue from CLUE_BANK
      const clues = CLUE_BANK[activeClue.word];
      if (clues) {
        const others = clues.filter(c => c !== activeClue.clue);
        hint = others.length > 0 ? others[Math.floor(Math.random() * others.length)] : clues[0];
      }
    }
    if (hint) setWordHintsUsed(prev => ({ ...prev, [activeWordKey]: hint }));
  };

  // Reveal just the active word's cells
  const doRevealWord = () => {
    if (!puzzle) return;
    const cells = getActiveWordCells();
    const newUserGrid = { ...userGrid };
    const newRevealed = { ...revealed };
    cells.forEach(({ r, c }) => {
      newUserGrid[`${r},${c}`] = puzzle.grid[r][c];
      newRevealed[`${r},${c}`] = true;
    });
    setUserGrid(newUserGrid);
    setRevealed(newRevealed);
    setConfirmAction(null);
  };

  const doRevealAll = () => {
    if (!puzzle) return;
    const newUserGrid = { ...userGrid };
    const newRevealed = { ...revealed };
    for (let r = 0; r < puzzle.rows; r++) {
      for (let c = 0; c < puzzle.cols; c++) {
        if (puzzle.grid[r][c]) {
          newUserGrid[`${r},${c}`] = puzzle.grid[r][c];
          newRevealed[`${r},${c}`] = true;
        }
      }
    }
    setUserGrid(newUserGrid);
    setRevealed(newRevealed);
    setConfirmAction(null);
  };

  const revealAll = () => setConfirmAction({ type: 'all', label: 'Reveal the entire puzzle?' });
  const revealWord = () => {
    if (!activeClue) return;
    setConfirmAction({ type: 'word', label: `Reveal ${activeClue.num} ${activeClue.dir === 'A' ? 'Across' : 'Down'}?` });
  };

  const useHint = () => {
    if (!puzzle || hintsLeft <= 0) return;
    // Count frequency of each letter in the grid that hasn't been hinted yet
    const freq = {};
    for (let r = 0; r < puzzle.rows; r++) {
      for (let c = 0; c < puzzle.cols; c++) {
        const letter = puzzle.grid[r][c];
        if (letter && !hintedLetters.has(letter)) {
          freq[letter] = (freq[letter] || 0) + 1;
        }
      }
    }
    if (Object.keys(freq).length === 0) return;
    // Pick the most frequent un-hinted letter
    const bestLetter = Object.entries(freq).sort((a, b) => b[1] - a[1])[0][0];
    // Reveal it everywhere in the grid
    const newUserGrid = { ...userGrid };
    const newRevealed = { ...revealed };
    for (let r = 0; r < puzzle.rows; r++) {
      for (let c = 0; c < puzzle.cols; c++) {
        if (puzzle.grid[r][c] === bestLetter) {
          newUserGrid[`${r},${c}`] = bestLetter;
          newRevealed[`${r},${c}`] = true;
        }
      }
    }
    setUserGrid(newUserGrid);
    setRevealed(newRevealed);
    setHintedLetters(prev => new Set([...prev, bestLetter]));
    setHintsLeft(h => h - 1);
  };

  const isSolved = useMemo(() => {
    if (!puzzle || !checked) return false;
    for (let r = 0; r < puzzle.rows; r++) {
      for (let c = 0; c < puzzle.cols; c++) {
        if (puzzle.grid[r][c] && userGrid[`${r},${c}`] !== puzzle.grid[r][c]) return false;
      }
    }
    return true;
  }, [puzzle, userGrid, checked]);

  useEffect(() => {
    if (isSolved) {
      onScore(200);
      celebrate();
      // Mark all words in this puzzle as mastered
      if (puzzle) {
        Object.values(puzzle.acrossClues).forEach(c => onCorrect(c.word));
        Object.values(puzzle.downClues).forEach(c => onCorrect(c.word));
      }
    }
  }, [isSolved]);

  if (!puzzle) return (
    <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', height: 300 }}>
      <div style={{ color: theme.accentLight, fontFamily: theme.fontDisplay, fontSize: 22 }}>Generating puzzle…</div>
    </div>
  );

  const { grid, rows, cols, numberedCells, acrossClues, downClues } = puzzle;

  // Larger cells since grids are more compact
  const maxCells = Math.max(rows, cols);
  const targetPx = Math.min(340, Math.floor(window.innerWidth * 0.92) - 8);
  const CELL = Math.max(26, Math.min(42, Math.floor(targetPx / maxCells)));
  const FONT = Math.max(10, CELL - 12);
  const NUM_FONT = Math.max(7, Math.floor(CELL * 0.3));

  // Highlight cells in active word
  const activeCells = new Set();
  if (selected) {
    let r = selected.r, c = selected.c;
    if (dir === 'A') {
      while (c > 0 && grid[r][c - 1] !== null) c--;
      while (c < cols && grid[r][c] !== null) { activeCells.add(`${r},${c}`); c++; }
    } else {
      while (r > 0 && grid[r - 1][c] !== null) r--;
      while (r < rows && grid[r][c] !== null) { activeCells.add(`${r},${c}`); r++; }
    }
  }

  return (
    <div style={{ maxWidth: 600, margin: '0 auto', padding: '24px 20px' }}>
      {/* Header */}
      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 16 }}>
        <Btn variant="ghost" small onClick={onBack}>← Back</Btn>
        <div style={{ fontFamily: "'Press Start 2P', monospace", fontSize: 13, fontWeight: 400, color: "#9b30d9", textAlign: "center" }}>SAT Crossword</div>
        <button onClick={generate} style={{
          background: theme.accent + '22', border: `1px solid ${theme.accent}55`,
          color: theme.accentLight, borderRadius: 8, padding: '5px 12px',
          fontSize: 13, cursor: 'pointer', fontFamily: theme.fontBody,
        }}>🔀 New</button>
      </div>

      {/* Active clue banner */}
      <div style={{
          minHeight: 46, padding: '10px 14px', borderRadius: 10, marginBottom: 12,
          background: theme.surface, border: `1.5px solid ${activeClue ? theme.accent + '66' : theme.border}`,
          transition: 'border-color 0.2s',
          display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: 8,
        }}>
        <div style={{ flex: 1 }}>
          {activeClue ? (
            <div>
              <span style={{ fontFamily: theme.fontMono, color: theme.accent, fontWeight: 700, fontSize: 13, marginRight: 8 }}>
                {activeClue.num}{activeClue.dir}
              </span>
              <span style={{ color: theme.textMuted, fontSize: 11, textTransform: 'uppercase', letterSpacing: 1, marginRight: 8 }}>
                {activeClue.pos}
              </span>
              <span style={{ color: theme.text, fontSize: 14 }}>{activeClue.clue}</span>
              {activeWordKey && activeWordKey in wordHintsUsed && (
                <div style={{ marginTop: 6 }}>
                  <span style={{ fontSize: 11, color: theme.accentLight, textTransform: 'uppercase', letterSpacing: 1 }}>💬 Another hint: </span>
                  <span style={{ fontSize: 13, color: theme.accentLight, fontStyle: 'italic' }}>
                    {wordHintsUsed[activeWordKey]}
                  </span>
                </div>
              )}
            </div>
          ) : (
            <span style={{ color: theme.textMuted, fontSize: 13 }}>Tap a cell to begin</span>
          )}
        </div>
        {selected && (
          <span style={{ fontSize: 18, flexShrink: 0 }}>⌨️</span>
        )}
      </div>

      {/* Grid */}
      <div style={{ overflowX: 'auto', marginBottom: 14 }}>
        <div style={{
          display: 'inline-grid',
          gridTemplateColumns: `repeat(${cols}, ${CELL}px)`,
          gridTemplateRows: `repeat(${rows}, ${CELL}px)`,
          gap: 2,
        }}>
          {Array.from({ length: rows }, (_, r) =>
            Array.from({ length: cols }, (_, c) => {
              const letter = grid[r][c];
              const key = `${r},${c}`;
              const num = numberedCells[key];
              const userLetter = userGrid[key];
              const isSelected = selected?.r === r && selected?.c === c;
              const isActive = activeCells.has(key);
              const isRevealed = revealed[key];
              const isCorrect = checked && userLetter && userLetter === letter;
              const isWrong = checked && userLetter && userLetter !== letter;

              if (!letter) return (
                <div key={key} style={{ width: CELL, height: CELL, background: '#070709' }} />
              );

              let bg = '#1e1e30';
              if (isCorrect && checked) bg = theme.success + '2a';
              if (isWrong && checked) bg = theme.danger + '2a';
              if (isActive && !isSelected) bg = theme.accent + '66';
              if (isSelected) bg = theme.accent; // always on top

              let textColor = theme.text;
              if (isCorrect && checked) textColor = theme.success;
              if (isWrong && checked) textColor = theme.danger;
              if (isRevealed) textColor = theme.gold;
              if (isSelected) textColor = '#fff'; // always on top

              return (
                <div key={key}
                  onClick={() => handleCellClick(r, c)}
                  style={{
                    width: CELL, height: CELL, position: 'relative',
                    background: bg, border: `1px solid #3a3a55`,
                    cursor: 'pointer', transition: 'background 0.1s',
                    display: 'flex', alignItems: 'center', justifyContent: 'center',
                  }}>
                  {num && (
                    <span style={{
                      position: 'absolute', top: 1, left: 2,
                      fontSize: NUM_FONT, color: isSelected ? '#ffffffaa' : theme.textMuted,
                      lineHeight: 1, fontFamily: theme.fontMono,
                    }}>{num}</span>
                  )}
                  {isSelected ? (
                    <input
                      ref={inputRef}
                      autoFocus
                      style={{
                        position: 'absolute', inset: 0,
                        width: '100%', height: '100%',
                        opacity: 0.01, fontSize: 16,
                        border: 'none', outline: 'none',
                        background: 'transparent', cursor: 'pointer',
                        caretColor: 'transparent',
                      }}
                      onKeyDown={handleKey}
                      onChange={handleChange}
                      autoCapitalize="characters"
                      autoComplete="off"
                      autoCorrect="off"
                      spellCheck="false"
                      inputMode="text"
                    />
                  ) : null}
                  <span style={{
                    fontSize: FONT, fontFamily: theme.fontMono,
                    fontWeight: 700, color: textColor, lineHeight: 1,
                    marginTop: num ? 4 : 0,
                    pointerEvents: 'none',
                  }}>
                    {userLetter || ''}
                  </span>
                </div>
              );
            })
          )}
        </div>
      </div>

      {/* Confirm modal */}
      {confirmAction && (
        <div style={{
          position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.7)',
          display: 'flex', alignItems: 'center', justifyContent: 'center',
          zIndex: 100, padding: 24,
        }}>
          <div style={{
            background: theme.surface, border: `1px solid ${theme.border}`,
            borderRadius: 16, padding: '24px 20px', maxWidth: 300, width: '100%', textAlign: 'center',
          }}>
            <div style={{ fontSize: 15, color: theme.text, marginBottom: 6, fontWeight: 700 }}>Are you sure?</div>
            <div style={{ fontSize: 13, color: theme.textMuted, marginBottom: 20 }}>{confirmAction.label}</div>
            <div style={{ display: 'flex', gap: 10 }}>
              <button onClick={() => setConfirmAction(null)} style={{
                flex: 1, padding: '10px', borderRadius: 9, border: `1px solid ${theme.border}`,
                background: 'transparent', color: theme.textMuted, fontSize: 14, cursor: 'pointer',
              }}>Cancel</button>
              <button onClick={confirmAction.type === 'word' ? doRevealWord : doRevealAll} style={{
                flex: 1, padding: '10px', borderRadius: 9, border: `1px solid ${theme.danger}66`,
                background: theme.danger + '22', color: theme.danger, fontSize: 14,
                fontWeight: 700, cursor: 'pointer',
              }}>Reveal</button>
            </div>
          </div>
        </div>
      )}

      {/* Controls — top row: reveal buttons */}
      <div style={{ display: 'flex', gap: 8, marginBottom: 8, flexWrap: 'wrap' }}>
        <button onClick={revealWord} disabled={!activeClue} style={{
          padding: '7px 12px', borderRadius: 9,
          border: `1px solid ${activeClue ? theme.danger + '55' : theme.border}`,
          background: activeClue ? theme.danger + '11' : 'transparent',
          color: activeClue ? theme.danger : theme.textMuted,
          fontSize: 12, cursor: activeClue ? 'pointer' : 'default',
          fontFamily: theme.fontBody, opacity: activeClue ? 1 : 0.4,
        }}>Reveal Word</button>
        <button onClick={revealAll} style={{
          padding: '7px 12px', borderRadius: 9, border: `1px solid ${theme.danger + '55'}`,
          background: theme.danger + '11', color: theme.danger,
          fontSize: 12, cursor: 'pointer', fontFamily: theme.fontBody,
        }}>Reveal All</button>
      </div>

      {/* Controls — bottom row: check + hints */}
      <div style={{ display: 'flex', gap: 8, marginBottom: 20, flexWrap: 'wrap', alignItems: 'center' }}>
        <button onClick={checkPuzzle} style={{
          padding: '8px 14px', borderRadius: 9,
          border: `1px solid ${checked ? theme.accent : theme.accent + '66'}`,
          background: checked ? theme.accent + '44' : theme.accent + '22',
          color: theme.accentLight,
          fontWeight: 700, fontSize: 13, cursor: 'pointer', fontFamily: theme.fontBody,
        }}>{checked ? '✓ Checking' : '✓ Check'}</button>
        <button onClick={useHint} disabled={hintsLeft <= 0} style={{
          padding: '8px 14px', borderRadius: 9,
          border: `1px solid ${hintsLeft > 0 ? theme.gold + '88' : theme.border}`,
          background: hintsLeft > 0 ? theme.gold + '18' : 'transparent',
          color: hintsLeft > 0 ? theme.gold : theme.textMuted,
          fontWeight: 700, fontSize: 13, cursor: hintsLeft > 0 ? 'pointer' : 'default',
          fontFamily: theme.fontBody, opacity: hintsLeft <= 0 ? 0.5 : 1,
        }}>💡 Letter ({hintsLeft})</button>
        <button onClick={useWordHint} disabled={!wordHintAvailable} style={{
          padding: '8px 14px', borderRadius: 9,
          border: `1px solid ${wordHintAvailable ? theme.accentLight + '88' : theme.border}`,
          background: wordHintAvailable ? theme.accentLight + '15' : 'transparent',
          color: wordHintAvailable ? theme.accentLight : theme.textMuted,
          fontWeight: 700, fontSize: 13, cursor: wordHintAvailable ? 'pointer' : 'default',
          fontFamily: theme.fontBody, opacity: wordHintAvailable ? 1 : 0.4,
        }}>💬 Word Hint</button>
        {isSolved && (
          <div style={{ padding: '8px 14px', color: theme.success, fontWeight: 700, fontSize: 14 }}>
            🎉 Solved! +200 pts
          </div>
        )}
      </div>

      {/* Clue lists */}
      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 16 }}>
        {[['ACROSS', acrossClues], ['DOWN', downClues]].map(([label, cluesObj]) => (
          <div key={label}>
            <div style={{
              fontFamily: theme.fontMono, fontWeight: 700, fontSize: 12,
              color: theme.accent, letterSpacing: 2, marginBottom: 8,
              textTransform: 'uppercase',
            }}>{label}</div>
            {Object.entries(cluesObj)
              .sort((a, b) => Number(a[0]) - Number(b[0]))
              .map(([num, { clue, word, pos }]) => {
                const isActive = activeClue?.num === Number(num) && activeClue?.dir === label[0];
                return (
                  <div key={num} onClick={() => jumpToClue(num, label[0])} style={{
                    marginBottom: 6, padding: '4px 6px', borderRadius: 6,
                    background: isActive ? theme.accent + '22' : 'transparent',
                    border: `1px solid ${isActive ? theme.accent + '55' : 'transparent'}`,
                    cursor: 'pointer',
                  }}>
                    <span style={{ fontFamily: theme.fontMono, color: theme.accent, fontWeight: 700, fontSize: 12, marginRight: 5 }}>{num}</span>
                    <span style={{ fontSize: 12, color: isActive ? theme.text : theme.textMuted, lineHeight: 1.5 }}>
                      {clue}
                    </span>
                  </div>
                );
              })}
          </div>
        ))}
      </div>

      <div style={{ marginTop: 12, color: theme.textMuted, fontSize: 11, textAlign: 'center' }}>
        Tap a cell to select • Tap again to switch direction
      </div>
      <CelebrationCanvas />
    </div>
  );
}


// ─── WORD DETECTIVE ───────────────────────────────────────────────────────────
function WordDetective({ onBack, onScore, onCorrect }) {
  const [pool] = useState(() =>
    getNextWords('detective_queue', WORD_BANK.filter(e => e.example), 75)
  );
  const [idx, setIdx] = useState(0);
  const [chosen, setChosen] = useState(null);
  const [score, setScore] = useState(0);
  const [streak, setStreak] = useState(0);
  const [answered, setAnswered] = useState([]);
  const [shuffledOptions, setShuffledOptions] = useState([]);
  const [showDefs, setShowDefs] = useState(false);

  useEffect(() => {
    setShowDefs(false);
  }, [idx]);

  const current = pool[idx];

  // Generate 3 distractor words dynamically from the rest of the pool
  const getDistractors = useCallback((entry) => {
    const others = WORD_BANK.filter(e => e.word !== entry.word);
    return [...others].sort(() => Math.random() - 0.5).slice(0, 3).map(e => e.word);
  }, []);

  useEffect(() => {
    if (current) {
      const distractors = getDistractors(current);
      setShuffledOptions([current.word, ...distractors].sort(() => Math.random() - 0.5));
    }
    setChosen(null);
  }, [idx]);

  const pick = (word) => {
    if (chosen) return;
    setChosen(word);
    const correct = word === current.word;
    if (correct) {
      const pts = 10 + streak * 5;
      setScore(s => s + pts);
      setStreak(s => s + 1);
      onScore(pts);
      onCorrect(current.word);
    } else {
      setStreak(0);
    }
    setAnswered(a => [...a, { word: current.word, sentence: current.example, correct, chosen: word }]);
  };

  const next = () => {
    if (idx < pool.length - 1) {
      setChosen(null);
      setShuffledOptions([]);
      setIdx(i => i + 1);
    }
  };

  const done = idx >= pool.length - 1 && chosen;

  const wordDef = (w) => WORD_BANK.find(b => b.word === w);

  return (
    <div className="fadeIn" style={{ maxWidth: 660, margin: "0 auto", padding: "24px 20px" }}>
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 24 }}>
        <Btn variant="ghost" small onClick={onBack}>← Back</Btn>
        <div style={{ fontFamily: "'Press Start 2P', monospace", fontSize: 13, color: "#f5e000", textAlign: "center" }}>Word Detective</div>
        <div style={{ display: "flex", gap: 10, alignItems: "center" }}>
          <Badge color={theme.gold}>{score} pts</Badge>
          {streak > 1 && <Badge color={theme.success}>🔥 {streak}x</Badge>}
        </div>
      </div>

      {current && !done && (
        <div className="fadeIn" key={idx}>
          <div style={{ marginBottom: 12, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
            <span style={{ color: theme.textMuted, fontSize: 14 }}>Question {idx + 1} of {pool.length}</span>
            <ProgressBar value={idx} max={pool.length} color={theme.gold} />
          </div>

          {/* Sentence */}
          <div style={{ background: theme.surface, border: `1px solid ${theme.border}`, borderRadius: 16, padding: 28, marginBottom: 24, position: "relative", overflow: "hidden" }}>
            <div style={{ position: "absolute", top: 0, left: 0, right: 0, height: 3, background: `linear-gradient(90deg, ${theme.gold}, ${theme.accent})` }} />
            <div style={{ fontSize: 11, textTransform: "uppercase", letterSpacing: 2, color: theme.gold, marginBottom: 12 }}>Fill in the blank</div>
            <div style={{ fontSize: 20, lineHeight: 1.7, color: theme.text, fontFamily: theme.fontDisplay }}>
              {current.example.split("___").map((part, i, arr) => (
                <span key={i}>
                  {part}
                  {i < arr.length - 1 && (
                    <span style={{
                      display: "inline-block", minWidth: 140, borderBottom: `2.5px solid ${chosen ? (chosen === current.word ? theme.success : theme.danger) : theme.accentLight}`,
                      textAlign: "center", marginHorizontal: 6, padding: "0 8px", fontFamily: theme.fontMono, fontWeight: 700, fontSize: 16,
                      color: chosen ? (chosen === current.word ? theme.success : theme.danger) : theme.accentLight, transition: "all 0.3s"
                    }}>
                      {chosen ? current.word : "  ?  "}
                    </span>
                  )}
                </span>
              ))}
            </div>
          </div>

          {/* Options */}
          <div style={{ display: "flex", justifyContent: "flex-end", marginBottom: 8 }}>
            <button onClick={() => setShowDefs(s => !s)} style={{
              background: "transparent", border: `1px solid ${theme.border}`, borderRadius: 8,
              color: theme.textMuted, fontSize: 12, padding: "4px 10px", cursor: "pointer",
              fontFamily: theme.fontBody,
            }}>
              {showDefs ? "Hide definitions" : "Show definitions"}
            </button>
          </div>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: 20 }}>
            {shuffledOptions.map((opt) => {
              const isCorrect = opt === current.word;
              const isChosen = chosen === opt;
              let bg = theme.surface, border = theme.border, color = theme.text;
              if (chosen) {
                if (isCorrect) { bg = theme.success + "22"; border = theme.success; color = theme.success; }
                else if (isChosen) { bg = theme.danger + "22"; border = theme.danger; color = theme.danger; }
                else { bg = theme.surface; color = theme.textMuted; }
              }
              const def = wordDef(opt);
              return (
                <div key={opt} onClick={() => pick(opt)}
                  style={{ cursor: chosen ? "default" : "pointer", background: bg, border: `1.5px solid ${border}`, borderRadius: 12, padding: "14px 16px", transition: "all 0.2s" }}
                  onMouseEnter={e => { if (!chosen) { e.currentTarget.style.background = theme.surfaceHover; e.currentTarget.style.border = `1.5px solid ${theme.accent}55`; }}}
                  onMouseLeave={e => { if (!chosen) { e.currentTarget.style.background = bg; e.currentTarget.style.border = `1.5px solid ${border}`; }}}>
                  <div style={{ fontFamily: theme.fontMono, fontWeight: 700, fontSize: 15, color }}>{opt}</div>
                  {showDefs && (
                    <div style={{ fontSize: 12, marginTop: 4, color: chosen ? (isCorrect ? theme.success + "cc" : theme.textMuted) : theme.textMuted, lineHeight: 1.5 }}>
                      {def?.pos} · {def?.def.substring(0, 60)}{def?.def.length > 60 ? "…" : ""}
                    </div>
                  )}
                </div>
              );
            })}
          </div>

          {/* Feedback */}
          {chosen && (
            <div className="fadeIn" style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
              <div style={{ fontSize: 15, color: chosen === current.word ? theme.success : theme.danger, fontWeight: 600 }}>
                {chosen === current.word ? `🎯 Correct! +${10 + (streak - 1) * 5} pts${streak > 1 ? " (streak bonus!)" : ""}` : `❌ The answer was ${current.word}`}
              </div>
              <Btn variant="primary" small onClick={next} disabled={idx >= pool.length - 1}>Next →</Btn>
            </div>
          )}
        </div>
      )}

      {done && (
        <div className="fadeIn pop" style={{ textAlign: "center", padding: 40 }}>
          <div style={{ fontFamily: theme.fontDisplay, fontSize: 40, marginBottom: 12 }}>🏆</div>
          <div style={{ fontFamily: theme.fontDisplay, fontSize: 28, fontWeight: 900, color: theme.gold, marginBottom: 8 }}>Game Complete!</div>
          <div style={{ fontSize: 18, color: theme.text, marginBottom: 24 }}>Final Score: <span style={{ color: theme.gold, fontFamily: theme.fontMono, fontWeight: 700 }}>{score} pts</span></div>
          <div style={{ color: theme.textMuted, marginBottom: 28 }}>You answered {answered.filter(a => a.correct).length} out of {answered.length} correctly.</div>
          <Btn variant="gold" onClick={() => { setIdx(0); setScore(0); setStreak(0); setAnswered([]); }}>Play Again</Btn>
        </div>
      )}

      {/* Answer history */}
      {answered.length > 0 && !done && (
        <div style={{ marginTop: 24, borderTop: `1px solid ${theme.border}`, paddingTop: 16 }}>
          <div style={{ fontSize: 12, color: theme.textMuted, marginBottom: 8 }}>History</div>
          <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
            {answered.map((a, i) => (
              <div key={i} style={{ width: 10, height: 10, borderRadius: 3, background: a.correct ? theme.success : theme.danger, title: a.word }} />
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

function tagWord(entry) {
  const text = (entry.def + " " + entry.word).toLowerCase();
  return SEMANTIC_TAGS
    .filter(({ keys }) => keys.some(k => text.includes(k)))
    .map(({ tag }) => tag);
}

function generateOddOneOutGroups(wordBank, count = 30) {
  // Tag all words
  const tagged = wordBank.map(e => ({ ...e, tags: tagWord(e) }))
    .filter(e => e.tags.length > 0);

  // Build bucket map
  const buckets = {};
  for (const e of tagged) {
    for (const tag of e.tags) {
      if (!buckets[tag]) buckets[tag] = [];
      buckets[tag].push(e);
    }
  }

  const tagNames = Object.keys(buckets).filter(t => buckets[t].length >= 4);
  const groups = [];
  const usedWords = new Set();

  const shuffledTags = shuffle([...tagNames]);

  for (const tag of shuffledTags) {
    if (groups.length >= count) break;
    const bucket = buckets[tag].filter(e => !usedWords.has(e.word));
    if (bucket.length < 3) continue;

    // Pick 3 from this bucket
    const three = shuffle([...bucket]).slice(0, 3);

    // Pick odd one out from a different bucket
    const otherTags = tagNames.filter(t => t !== tag);
    let odd = null;
    for (const otherTag of shuffle([...otherTags])) {
      const otherBucket = buckets[otherTag].filter(
        e => !usedWords.has(e.word) && !three.find(w => w.word === e.word) &&
        !e.tags.includes(tag) // make sure it genuinely doesn't belong
      );
      if (otherBucket.length > 0) {
        odd = shuffle([...otherBucket])[0];
        break;
      }
    }
    if (!odd) continue;

    // Mark used
    [...three, odd].forEach(e => usedWords.add(e.word));

    groups.push({
      theme: `All mean or relate to: ${tag}`,
      words: [...three.map(e => e.word), odd.word],
      odd: odd.word,
    });
  }

  return groups;
}

// ─── ODD ONE OUT COMPONENT ────────────────────────────────────────────────────
function OddOneOut({ onBack, onScore, onCorrect }) {
  const [pool] = useState(() => {
    // Mix: half hand-crafted (for quality), half auto-generated (for coverage)
    const handCrafted = shuffle([...ODD_ONE_OUT_GROUPS]).slice(0, 15);
    const autoGenerated = generateOddOneOutGroups(WORD_BANK, 20);
    return shuffle([...handCrafted, ...autoGenerated]);
  });
  const [idx, setIdx] = useState(0);
  const [chosen, setChosen] = useState(null);
  const [score, setScore] = useState(0);
  const [streak, setStreak] = useState(0);
  const [history, setHistory] = useState([]);
  const [shuffledWords, setShuffledWords] = useState([]);

  const current = pool[idx];

  useEffect(() => {
    if (current) {
      setShuffledWords([...current.words].sort(() => Math.random() - 0.5));
    }
    setChosen(null);
  }, [idx]);

  const pick = (word) => {
    if (chosen) return;
    setChosen(word);
    const correct = word === current.odd;
    if (correct) {
      const pts = 15 + streak * 5;
      setScore(s => s + pts);
      setStreak(s => s + 1);
      onScore(pts);
      current.words.forEach(w => onCorrect(w));
    } else {
      setStreak(0);
    }
    setHistory(h => [...h, { correct, word, odd: current.odd }]);
  };

  const next = () => {
    if (idx < pool.length - 1) setIdx(i => i + 1);
  };

  const done = idx >= pool.length - 1 && chosen;
  const progress = idx / pool.length;

  if (!current) return null;

  return (
    <div style={{ maxWidth: 480, margin: "0 auto", padding: "24px 20px" }}>
      {/* Header */}
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 24 }}>
        <Btn variant="ghost" small onClick={onBack}>← Back</Btn>
        <div style={{ textAlign: "center" }}>
          <div style={{ fontFamily: "'Press Start 2P', monospace", fontSize: 13, fontWeight: 400, color: "#00f5a0", textAlign: "center" }}>Odd One Out</div>
        </div>
        <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
          {streak >= 2 && <span style={{ fontSize: 13, color: theme.gold }}>🔥 {streak}</span>}
          <span style={{ fontFamily: theme.fontMono, fontWeight: 700, color: theme.accentLight, fontSize: 15 }}>{score}</span>
        </div>
      </div>

      {/* Progress bar */}
      <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 6 }}>
        <span style={{ fontFamily: theme.fontMono, fontSize: 11, color: theme.textMuted }}>{idx + 1} / {pool.length}</span>
      </div>
      <div style={{ height: 3, background: theme.border, borderRadius: 2, marginBottom: 28, overflow: "hidden" }}>
        <div style={{ height: "100%", width: `${progress * 100}%`, background: `linear-gradient(90deg, ${theme.accent}, ${theme.gold})`, borderRadius: 2, transition: "width 0.4s" }} />
      </div>

      {/* Prompt */}
      <div style={{ textAlign: "center", marginBottom: 28 }}>
        <div style={{ fontSize: 13, color: theme.textMuted, textTransform: "uppercase", letterSpacing: 2, marginBottom: 8 }}>Which word doesn't belong?</div>
        {chosen && (
          <div className="fadeIn" style={{
            padding: "10px 16px", borderRadius: 10, marginTop: 8,
            background: theme.surface, border: `1px solid ${theme.accent}44`,
            fontSize: 13, color: theme.accentLight, lineHeight: 1.5,
          }}>
            <span style={{ color: theme.textMuted }}>Theme: </span>
            {current.theme.replace('All mean or relate to: ', '').replace(/^\w/, c => c.toUpperCase())}
          </div>
        )}
      </div>

      {/* Word tiles */}
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12, marginBottom: 24 }}>
        {shuffledWords.map((word) => {
          const isOdd = word === current.odd;
          const isChosen = chosen === word;
          const wasChosen = !!chosen;

          let bg = theme.surface;
          let border = theme.border;
          let textColor = theme.text;
          let scale = "1";

          if (wasChosen) {
            if (isOdd) {
              bg = theme.success + "22";
              border = theme.success;
              textColor = theme.success;
            } else if (isChosen && !isOdd) {
              bg = theme.danger + "22";
              border = theme.danger;
              textColor = theme.danger;
            } else {
              textColor = theme.textMuted;
            }
          }

          return (
            <div key={word}
              onClick={() => pick(word)}
              style={{
                padding: "18px 12px",
                borderRadius: 14,
                border: `2px solid ${border}`,
                background: bg,
                cursor: wasChosen ? "default" : "pointer",
                textAlign: "center",
                transition: "all 0.18s",
                transform: `scale(${scale})`,
                position: "relative",
              }}
              onMouseEnter={e => { if (!wasChosen) { e.currentTarget.style.background = theme.surfaceHover; e.currentTarget.style.borderColor = theme.accent + "88"; }}}
              onMouseLeave={e => { if (!wasChosen) { e.currentTarget.style.background = theme.surface; e.currentTarget.style.borderColor = theme.border; }}}
            >
              <div style={{ fontFamily: theme.fontMono, fontWeight: 700, fontSize: 14, color: textColor, letterSpacing: 1 }}>
                {word}
              </div>
              {wasChosen && (
                <div style={{ fontSize: 11, color: textColor === theme.textMuted ? theme.textMuted : textColor + "cc", marginTop: 6, lineHeight: 1.4, fontStyle: "italic" }}>
                  {WORD_BANK.find(e => e.word === word)?.def.slice(0, 48)}…
                </div>
              )}
              {wasChosen && isOdd && (
                <div style={{ position: "absolute", top: -8, right: -8, background: theme.success, borderRadius: "50%", width: 20, height: 20, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 11 }}>✓</div>
              )}
              {wasChosen && isChosen && !isOdd && (
                <div style={{ position: "absolute", top: -8, right: -8, background: theme.danger, borderRadius: "50%", width: 20, height: 20, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 11 }}>✗</div>
              )}
            </div>
          );
        })}
      </div>

      {/* Result + Next */}
      {chosen && (
        <div className="fadeIn">
          <div style={{
            textAlign: "center", padding: "12px 16px", borderRadius: 12, marginBottom: 16,
            background: chosen === current.odd ? theme.success + "18" : theme.danger + "18",
            border: `1px solid ${chosen === current.odd ? theme.success + "44" : theme.danger + "44"}`,
          }}>
            {chosen === current.odd ? (
              <span style={{ color: theme.success, fontWeight: 700, fontSize: 15 }}>
                ✓ Correct! {streak > 1 ? `+${15 + (streak - 1) * 5} pts (${streak}x streak)` : "+15 pts"}
              </span>
            ) : (
              <span style={{ color: theme.danger, fontWeight: 700, fontSize: 15 }}>
                The odd one out was <span style={{ fontFamily: theme.fontMono }}>{current.odd}</span>
              </span>
            )}
          </div>

          {done ? (
            <div style={{ textAlign: "center" }}>
              <div style={{ fontFamily: theme.fontDisplay, fontSize: 24, fontWeight: 900, color: theme.gold, marginBottom: 8 }}>All done! 🎉</div>
              <div style={{ color: theme.textMuted, marginBottom: 16 }}>Final score: <span style={{ color: theme.accentLight, fontWeight: 700 }}>{score} pts</span></div>
              <div style={{ display: "flex", gap: 8, justifyContent: "center" }}>
                <Btn variant="primary" onClick={onBack}>Home</Btn>
              </div>
            </div>
          ) : (
            <Btn variant="primary" onClick={next} style={{ width: "100%" }}>Next →</Btn>
          )}
        </div>
      )}

      {/* History dots */}
      {history.length > 0 && (
        <div style={{ display: "flex", gap: 4, justifyContent: "center", flexWrap: "wrap", marginTop: 20 }}>
          {history.map((h, i) => (
            <div key={i} style={{ width: 8, height: 8, borderRadius: "50%", background: h.correct ? theme.success : theme.danger }} />
          ))}
        </div>
      )}
    </div>
  );
}

function getBestVoice() {
  const voices = window.speechSynthesis.getVoices();
  if (!voices.length) return null;
  // Preference order: neural/enhanced iOS voices, Google neural, then any en-US
  const preferred = [
    'Samantha', 'Aaron', 'Nicky', 'Ava',        // iOS enhanced neural
    'Google US English',                          // Chrome neural
    'Microsoft Aria Online',                      // Edge neural
    'Alex',                                       // macOS
  ];
  for (const name of preferred) {
    const v = voices.find(v => v.name === name);
    if (v) return v;
  }
  // Fallback: any enhanced/premium en-US voice
  const enhanced = voices.find(v => v.lang.startsWith('en') && (v.name.includes('Enhanced') || v.name.includes('Premium') || v.name.includes('Neural')));
  if (enhanced) return enhanced;
  // Last resort: any en-US
  return voices.find(v => v.lang === 'en-US') || voices[0];
}

function speak(text, rate = 0.82) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const utt = new SpeechSynthesisUtterance(text);
  utt.rate = rate;
  utt.pitch = 1.0;
  utt.lang = 'en-US';
  const voice = getBestVoice();
  if (voice) {
    utt.voice = voice;
    window.speechSynthesis.speak(utt);
  } else {
    let spoken = false;
    const doSpeak = () => {
      if (spoken) return;
      spoken = true;
      utt.voice = getBestVoice();
      window.speechSynthesis.speak(utt);
    };
    const onVoicesChanged = () => {
      window.speechSynthesis.removeEventListener('voiceschanged', onVoicesChanged);
      doSpeak();
    };
    window.speechSynthesis.addEventListener('voiceschanged', onVoicesChanged);
    setTimeout(() => {
      window.speechSynthesis.removeEventListener('voiceschanged', onVoicesChanged);
      doSpeak();
    }, 500);
  }
}

function EarTrainer({ onBack, onScore, onCorrect }) {
  const [pool] = useState(() =>
    getNextWords('eartrainer_queue', WORD_BANK.filter(e => e.example), 75)
  );
  const [idx, setIdx] = useState(0);
  const [chosen, setChosen] = useState(null);
  const [usedHint, setUsedHint] = useState(false);
  const [revealed, setRevealed] = useState(false);

  const [streak, setStreak] = useState(0);
  const [history, setHistory] = useState([]);
  const [options, setOptions] = useState([]);
  const [speaking, setSpeaking] = useState(false);

  const current = pool[idx];

  // Build shuffled options whenever question changes
  useEffect(() => {
    if (!current) return;
    const distractors = WORD_BANK
      .filter(e => e.word !== current.word)
      .sort(() => Math.random() - 0.5)
      .slice(0, 3)
      .map(e => ({ word: e.word, def: e.def }));
    setOptions([{ word: current.word, def: current.def }, ...distractors].sort(() => Math.random() - 0.5));
    setChosen(null);
    setUsedHint(false);
    setRevealed(false);
    // Auto-speak the word after a short pause
    setTimeout(() => speakWord(), 400);
  }, [idx]);

  const speakWord = () => {
    setSpeaking(true);
    speak(current.word);
    setTimeout(() => setSpeaking(false), current.word.length * 120 + 600);

    if (usedHint) {
      // Re-play sentence
      speak(current.example.replace("___", current.word), 0.82);
      return;

    setUsedHint(true);
    speak(current.example.replace("___", current.word), 0.82);
  };

  const pick = (word) => {
    if (chosen) return;
    setChosen(word);
    setRevealed(true);
    const correct = word === current.word;
    if (correct) {
      const pts = (usedHint ? 15 : 20) + streak * 5;

      setStreak(s => s + 1);
      onScore(pts);
      onCorrect(current.word);

      setStreak(0);

    setHistory(h => [...h, { correct, word, answer: current.word }]);
  };

  const next = () => {
    if (idx < pool.length - 1) setIdx(i => i + 1);
  };
