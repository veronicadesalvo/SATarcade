        for (const url of URLS) {
          try {
            importScripts(url);
            sfLoaded = true;
            break;
          } catch(e) {}
        }
        
        if (!sfLoaded) {
          postMessage('error:Could not load Stockfish engine. Check internet connection.');
        } else {
          // Stockfish loaded — wire it up
          // stockfish() may be a function or already running
          const factory = typeof STOCKFISH === 'function' ? STOCKFISH
            : typeof Stockfish === 'function' ? Stockfish
            : null;
          const existingHandler = self.onmessage;
          if (factory) {
            const sf = factory();
            sf.onmessage = function(event) { postMessage(event.data || event); };
            self.onmessage = function(e) { sf.postMessage(e.data); };
            postMessage('uciok');
          } else if (typeof existingHandler === 'function') {
            // Some Stockfish builds are already worker scripts: keep their UCI handler.
            self.onmessage = existingHandler;
          } else {
            postMessage('error:Stockfish loaded, but this build could not be started.');
          }
        }
      `;
      
      const blob = new Blob([workerCode], { type: 'application/javascript' });
      const blobUrl = URL.createObjectURL(blob);
      const worker = new Worker(blobUrl);
      URL.revokeObjectURL(blobUrl);
      workerRef.current = worker;

      worker.onerror = (e) => {
        setSfError('Stockfish did not load; using the built-in engine fallback.');
      };

      worker.onmessage = (e) => {
        const msg = typeof e.data === 'string' ? e.data : String(e.data);
        if (msg.startsWith('error:')) {
          setSfError(msg.slice(6));
          return;
        }
        if (msg.startsWith('id ') || msg.startsWith('option ')) {
          // info messages during UCI init, ignore
        } else if (msg === 'uciok') {
          worker.postMessage('isready');
        } else if (msg === 'readyok') {
          setSfReady(true);
        } else if (msg.startsWith('bestmove')) {
          const parts = msg.split(' ');
          const uci = parts[1];
          if (resolveRef.current && uci && uci !== '(none)') {
            resolveRef.current(uci);
            resolveRef.current = null;
          } else if (resolveRef.current) {
            resolveRef.current(null);
            resolveRef.current = null;
          }
        }
      };

      // Kick off UCI init
      worker.postMessage('uci');
    } catch(e) {
      setSfError('Web Workers not available. Try opening the file directly in Chrome or Firefox.');
    }

    return () => {
      if (workerRef.current) workerRef.current.terminate();
    };
  }, []);

  const getBestMove = React.useCallback((fen, sfDifficulty) => {
    return new Promise((resolve) => {
      if (!workerRef.current) { resolve(null); return; }
      resolveRef.current = resolve;
      const w = workerRef.current;

      if (sfDifficulty === 'sf-easy') {
        w.postMessage('setoption name UCI_LimitStrength value true');
        w.postMessage('setoption name UCI_Elo value 800');
      } else if (sfDifficulty === 'sf-medium') {
        w.postMessage('setoption name UCI_LimitStrength value true');
        w.postMessage('setoption name UCI_Elo value 1300');
      } else {
        w.postMessage('setoption name UCI_LimitStrength value false');
      }

      w.postMessage('ucinewgame');
      w.postMessage(`position fen ${fen}`);
      const depth = sfDifficulty === 'sf-hard' ? 15 : 10;
      w.postMessage(`go depth ${depth}`);
    });
  }, []);

  const getBestMoveForHint = React.useCallback((fen) => {
    return new Promise((resolve) => {
      if (!workerRef.current) { resolve(null); return; }
      resolveRef.current = resolve;
      const w = workerRef.current;
      w.postMessage('setoption name UCI_LimitStrength value false');
      w.postMessage(`position fen ${fen}`);
      w.postMessage('go depth 12');
    });
  }, []);

  return { sfReady, sfError, getBestMove, getBestMoveForHint };
}

// ─── VOCAB CHESS STOCKFISH ────────────────────────────────────────────────────
function VocabChessStockfish({ onBack, onCorrect, wordBank = WORD_BANK }) {
  const C = "#a78bfa"; // purple to distinguish from classic blue
  const { sfReady, sfError, getBestMove, getBestMoveForHint } = useStockfishWorker();

  const [aiFlash, setAiFlash] = useState(null);
  const [lastAiMove, setLastAiMove] = useState(null);
  const [moveHistory, setMoveHistory] = useState([]);
  const [shownTips, setShownTips] = useState(new Set());
  const [msg, setMsg] = useState('');
  const [coachMsg, setCoachMsg] = useState('');
  const [lastWord, setLastWord] = useState(null);
  const [blunderWarn, setBlunderWarn] = useState(null);
  const [reversing, setReversing] = useState(false);
  const [hint, setHint] = useState(null);
  const [hintLoading, setHintLoading] = useState(false);
  const [hintsUsed, setHintsUsed] = useState(0);
  const [threatArrows, setThreatArrows] = useState([]);
  const [showOverlays, setShowOverlays] = useState(true);
  const [showCoachTips, setShowCoachTips] = useState(true);
  const [bookSeed, setBookSeed] = useState(() => Math.random());
  const [correctStreak, setCorrectStreak] = useState(0);
  const [streakFlash, setStreakFlash] = useState(false);
  const [openingName, setOpeningName] = useState(null);
  const [wordsThisGame, setWordsThisGame] = useState([]);
  const [showWordReview, setShowWordReview] = useState(false);

  const gameRef = useRef(game);
  gameRef.current = game;
  const boardRef = useRef(null);
  const cellSizeRef = useRef(44);
  const moveHistoryRef = useRef(moveHistory);
  moveHistoryRef.current = moveHistory;
  const lastAiMoveRef = useRef(lastAiMove);
  lastAiMoveRef.current = lastAiMove;

  const { triggerExplosion, ExplodeSVG } = useExplosion();
  const cellSize = Math.min(44, Math.floor((Math.min(window.innerWidth, 500) - 32) / 8));
  cellSizeRef.current = cellSize;

  const showMsg = (m, dur=2000) => { setMsg(m); setTimeout(()=>setMsg(''),dur); };
  const showCoach = (m) => { if (m && showCoachTips) { setCoachMsg(m); setTimeout(()=>setCoachMsg(''),4000); } };

  const newGame = () => {
    const g = createGame();
    setGame(g); setSelected(null); setLegalDests([]); setLastMove(null);
    setCaptured({w:[],b:[]}); setTurn('w'); setGameOver(null);
    setQuiz(null); setWinBackQuiz(null); setReversing(null); setAiFlash(null);
    setLastAiMove(null); setMoveHistory([]); setShownTips(new Set());
	    setMsg(''); setCoachMsg(''); setBlunderWarn(null);
    setHint(null); setHintsUsed(0); setBookSeed(Math.random()); resetAiSeed();
    setCorrectStreak(0); setStreakFlash(false); setOpeningName(null);
    setWordsThisGame([]); setShowWordReview(false); setThreatArrows([]);
  };

  const checkOver = (g) => {
    const lm = getLegal(g.board, 'w', g);
    if (!lm.length) {
      if (inCheck(g.board, 'w')) { setGameOver('lose'); return true; }
      setGameOver('stalemate'); return true;
    }
    const lmb = getLegal(g.board, 'b', g);
    if (!lmb.length) {
      if (inCheck(g.board, 'b')) { setGameOver('win'); return true; }
      setGameOver('stalemate'); return true;
    }
    if (gameIsDraw(g)) { setGameOver('draw'); return true; }
    return false;
  };

  // ── Stockfish AI turn ────────────────────────────────────────────────────────
  const doAiTurn = async (g) => {
    setTurn('b');
    const current = g || gameRef.current;
    if (current.turn !== 'b') { setTurn('w'); return; }

    const fen = boardToFen(current);
    let uci = null;
    try {
      uci = await getBestMove(fen, difficulty);
    } catch(e) {
      console.error('Stockfish error:', e);
    }

    if (!uci) { setTurn('w'); return; }
    const sfMove = uciToMove(uci, current.board);
    if (!sfMove) { setTurn('w'); return; }

    // Find matching legal move (handles promotion etc)
    const legalMoves = getLegal(current.board, 'b', current);
    const move = legalMoves.find(m =>
      m.from[0]===sfMove.from[0] && m.from[1]===sfMove.from[1] &&
      m.to[0]===sfMove.to[0] && m.to[1]===sfMove.to[1]
    ) || sfMove;

    if (!move) { setTurn('w'); return; }

    const result = gameMove(current, move.from, move.to);
    const toPos = move.to;
    setLastAiMove(move);
    setAiFlash(toPos);
    setTimeout(()=>setAiFlash(null), 600);
    setGame(result);
    setLastMove({from:move.from, to:toPos});
    setMoveHistory(h => [...h, {from:move.from, to:toPos}]);

    // Threat arrows are shown on demand when the player taps a threatened piece.
    setThreatArrows([]);

    if (result.captured) {
      if (boardRef.current) {
        const rect = boardRef.current.getBoundingClientRect();
        triggerExplosion(rect.left + (toPos[1]+0.5)*cellSizeRef.current, rect.top + (toPos[0]+0.5)*cellSizeRef.current, true);
        playExplosionSound(true);
      }
      const capType = result.captured.type;
      showMsg(`Opponent captured your ${PIECE_NAMES[capType]}!`, 2000);
      setCaptured(prev=>({...prev, b:[...prev.b, capType]}));
    }
    if (!checkOver(result)) setTurn('w');
  };

  // ── Stockfish hint ────────────────────────────────────────────────────────────
  const getHintSF = async () => {
    if (hintLoading || turn !== 'w') return;
    const startedAt = performance.now();
    setHintLoading(true);
    setHint(null);
    await waitForPaint();
    let nextHint = null;
    try {
      // Flip turn to white for hint (Stockfish expects position from current player)
      const fen = boardToFen({...gameRef.current, turn: 'w'});
      const uci = await getBestMoveForHint(fen);
      if (uci) {
        const sfMove = uciToMove(uci, gameRef.current.board);
        const legalMoves = getLegal(gameRef.current.board, 'w', gameRef.current);
        const move = legalMoves.find(m =>
          m.from[0]===sfMove.from[0] && m.from[1]===sfMove.from[1] &&
          m.to[0]===sfMove.to[0] && m.to[1]===sfMove.to[1]
        );
        if (move) {
          const from = toSq(move.from[0], move.from[1]);
          const to = toSq(move.to[0], move.to[1]);
          const piece = gameRef.current.board[move.from[0]][move.from[1]];
          nextHint = { move, label: 'STOCKFISH', reason: `${PIECE_NAMES[piece?.type] || 'Piece'} from ${from} to ${to}` };
        }
      }
    } catch(e) { console.error('SF hint error:', e); }
    const remaining = HINT_LOADING_MIN_MS - (performance.now() - startedAt);
    if (remaining > 0) await wait(remaining);
    if (nextHint) { setHint(nextHint); setHintsUsed(h => h+1); }
    setHintLoading(false);
  };

  const threatened = turn==='w' ? getThreatenedSquares(game.board, 'b') : new Set();

        <div style={{position:'absolute',left:0,right:0,textAlign:'center',pointerEvents:'none'}}>
          <GameHeaderTitle game="chess" title="VOCAB CHESS SF" color={C} fontSize={14} />
        </div>
          <div style={{width:60}}/>
        </div>
        <div style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'32px 24px',gap:12}}>

          {/* Stockfish status */}
          <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:4}}>
            <div style={{width:8,height:8,borderRadius:'50%',background:sfError?theme.danger:sfReady?theme.success:'#f59e0b',
              boxShadow:`0 0 6px ${sfError?theme.danger:sfReady?theme.success:'#f59e0b'}`}}/>
            <span style={{fontSize:12,color:theme.textMuted,fontFamily:theme.fontMono}}>
              {sfError ? 'Engine unavailable' : sfReady ? 'Stockfish ready' : 'Loading engine…'}
            </span>
          </div>
          {sfError && <div style={{fontSize:12,color:theme.danger,textAlign:'center',maxWidth:300}}>{sfError}</div>}

          <div style={{fontFamily:"'Press Start 2P', monospace",fontSize:10,fontWeight:400,color:'#fff',letterSpacing:2,marginBottom:4,lineHeight:1.6}}>SELECT MODE</div>

          <button onClick={() => setDifficulty('puzzles')} style={{
            width:'100%',maxWidth:320,padding:'18px 20px',borderRadius:12,
            background:'#f59e0b18',border:`2px solid #f59e0b88`,cursor:'pointer',textAlign:'left',
          }}>
            <div style={{fontFamily:"'Press Start 2P', monospace",fontSize:10,fontWeight:400,color:'#f59e0b',letterSpacing:2,marginBottom:8,lineHeight:1.6}}>PUZZLES</div>
            <div style={{fontSize:13,color:'rgba(255,255,255,0.8)',lineHeight:1.45}}>Train tactics. Learn words.</div>
          </button>

          <div style={{fontFamily:"'Press Start 2P', monospace",fontSize:7,fontWeight:400,color:'#fff',letterSpacing:2,margin:'6px 0',lineHeight:1.6}}>-- VS OPPONENT --</div>

          {[
            {id:'sf-easy',   label:'EASY',   sub:'A kinder chessboard for building confidence. (~500-700 ELO)', color:'#00cc66', disabled:!sfReady},
            {id:'sf-medium', label:'MEDIUM', sub:'The opponent starts noticing your mistakes. (~1000-1300 ELO)', color:C, disabled:!sfReady},
            {id:'sf-hard',   label:'HARD',   sub:'Sharper tactics. Fewer second chances. (~1600-2000+ ELO)', color:'#ff4444', disabled:!sfReady},
          ].map(d => (
            <button key={d.id} onClick={() => !d.disabled && setDifficulty(d.id)} style={{
              width:'100%',maxWidth:320,padding:'18px 20px',borderRadius:12,
              background:d.color+'18',border:`2px solid ${d.disabled?theme.border:d.color+'66'}`,
              cursor:d.disabled?'not-allowed':'pointer',textAlign:'left',opacity:d.disabled?0.5:1,
            }}>
              <div style={{fontFamily:"'Press Start 2P', monospace",fontSize:10,fontWeight:400,color:d.disabled?theme.textMuted:d.color,letterSpacing:2,marginBottom:8,lineHeight:1.6}}>{d.label}</div>
              <div style={{fontSize:13,color:'rgba(255,255,255,0.8)',lineHeight:1.45}}>{d.disabled ? 'Waiting for engine…' : d.sub}</div>
            </button>
          ))}
        </div>
      </div>

  const showThreatForSquare = (B, r, c) => {

                    setLastAiMove(bonusMove); setAiFlash(bonusMove.to);
                    setTimeout(()=>setAiFlash(null),600);
                    setGame(bonusResult); setLastMove({from:bonusMove.from,to:bonusMove.to});
                    if (bonusResult.captured) {
                      if (boardRef.current) {
                        const rect=boardRef.current.getBoundingClientRect();
                        triggerExplosion(rect.left+(bonusMove.to[1]+0.5)*cellSizeRef.current,rect.top+(bonusMove.to[0]+0.5)*cellSizeRef.current,true);
                        playExplosionSound(true);
                      }
                      setCaptured(prev=>({...prev,b:[...prev.b,bonusResult.captured.type]}));
                    }
                    if (!checkOver(bonusResult)) setTurn('w');
                  }, 2200);
                }
              }
            });
          }, 300);
        } else {
          const result = gameMove(g, selected, [r,c]);
          setGame(result); setLastMove({from:selected,to:[r,c]});
          setSelected(null); setLegalDests([]);
          setMoveHistory(h=>{
            const nh=[...h,{from:selected,to:[r,c]}];
            const oName=getOpeningName(nh);
            if(oName) setOpeningName(oName);
            return nh;
          });
          if (!checkOver(result)) doAiTurn(result);
        }
        return;
      }
      if (g.board[r][c]?.color==='w') {

        showThreatForSquare(g.board, r, c);
      } else { setSelected(null); setLegalDests([]); }

    if (g.board[r][c]?.color==='w') {
      setSelected([r,c]);
      setLegalDests(getLegal(g.board,'w',g).filter(m=>m.from[0]===r&&m.from[1]===c).map(m=>m.to));
      showThreatForSquare(g.board, r, c);

  };

  const diffColor = difficulty==='sf-easy'?'#00cc66':difficulty==='sf-hard'?'#ff4444':C;
  const diffLabel = difficulty==='sf-easy'?'EASY':difficulty==='sf-hard'?'HARD':'MEDIUM';

  return (
    <div style={{minHeight:'100vh',background:theme.bg,display:'flex',flexDirection:'column'}}>
      <div style={{position:'relative',display:'flex',alignItems:'center',justifyContent:'space-between',padding:'16px 20px',borderBottom:`1px solid ${theme.border}`}}>
        <button onClick={onBack} style={{background:'none',border:`1px solid ${C}`,color:C,fontSize:13,cursor:'pointer',borderRadius:10,padding:'8px 16px',fontFamily:theme.fontBody,fontWeight:600}}>← Back</button>
        <div style={{position:'absolute',left:0,right:0,textAlign:'center',pointerEvents:'none'}}>
          <GameHeaderTitle

            fontSize={14}
            detail={{text:diffLabel,color:diffColor,opacity:0.9}}

        </div>
        <div style={{width:60}}/>

          borderBottom:`1px solid ${turn==='w'?theme.success+'44':turn==='b'?theme.danger+'44':theme.gold+'44'}`}}>
          <span style={{fontFamily:theme.fontMono,fontSize:12,fontWeight:700,letterSpacing:1,

            {turn==='w'?'● YOUR TURN (WHITE)':turn==='b'?'○ OPPONENT THINKING…':turn==='quiz'?'📖 VOCAB CHALLENGE':''}

          <div style={{fontFamily:theme.fontMono,fontSize:16,fontWeight:700,color:gameOver==='win'?theme.success:gameOver==='lose'?theme.danger:theme.textMuted,marginBottom:8}}>
            {gameOver==='win'?'🏆 YOU WIN!':gameOver==='lose'?'💀 CHECKMATE':gameOver==='stalemate'?'🤝 STALEMATE':'🤝 DRAW'}
          </div>
          <div style={{display:'flex',flexDirection:'column',gap:10,alignItems:'center'}}>
            {wordsThisGame.length>0&&(
              <button onClick={()=>setShowWordReview(true)} style={{background:C+'22',border:`1px solid ${C}55`,color:C,fontFamily:theme.fontMono,fontSize:11,padding:'8px 20px',cursor:'pointer',borderRadius:8,letterSpacing:1}}>
                📖 REVIEW WORDS ({wordsThisGame.length})
              </button>
            )}
            <button onClick={newGame} style={{background:C,border:'none',borderRadius:8,color:'#fff',fontFamily:theme.fontMono,fontSize:12,padding:'8px 24px',cursor:'pointer',letterSpacing:1}}>NEW GAME</button>
          </div>
        </div>
      )}

	      {/* Captured pieces */}
	      {!gameOver && (
	        <div style={{display:'flex',justifyContent:'center',alignItems:'center',padding:'8px 20px',borderBottom:`1px solid ${theme.border}22`}}>
	          <div style={{display:'flex',gap:12,alignItems:'center'}}>
	            <div style={{fontSize:11,color:theme.textMuted}}>
	              Captured: ♙{captured.w.filter(p=>p==='p').length} ♘{captured.w.filter(p=>p==='n').length} ♗{captured.w.filter(p=>p==='b').length} ♖{captured.w.filter(p=>p==='r').length} ♕{captured.w.filter(p=>p==='q').length}
	            </div>
	          </div>
	        </div>
	      )}

      {/* Quiz overlay */}
      {quiz && ReactDOM.createPortal(
        <QuizOverlay quiz={quiz} wordBank={wordBank} />, document.body
      )}

      {/* Win-back quiz */}
      {winBackQuiz && ReactDOM.createPortal(
        <QuizOverlay quiz={winBackQuiz} wordBank={wordBank} />, document.body
      )}

      {/* Board */}
      <div style={{display:'flex',flexDirection:'column',alignItems:'center',padding:'16px 16px 0',gap:8}}>
        <div ref={boardRef} style={{position:'relative',display:'grid',gridTemplateColumns:`repeat(8,${cellSize}px)`,
          border:`3px solid ${turn==='w'?theme.success:turn==='b'?theme.danger:'#555'}`,borderRadius:6,overflow:'visible',flexShrink:0,
          transition:'border-color 0.3s',boxShadow:`0 0 20px ${turn==='w'?theme.success+'44':turn==='b'?theme.danger+'44':'transparent'}`}}>
          {Array.from({length:64}).map((_,i)=>{
            const r=Math.floor(i/8),c=i%8;
            const piece=game.board[r][c];
            const isLight=(r+c)%2===0;
            const isSel=selected&&selected[0]===r&&selected[1]===c;
            const isDest=legalDests.some(([lr,lc])=>lr===r&&lc===c);
            const isLastFrom=lastMove&&lastMove.from[0]===r&&lastMove.from[1]===c;
            const isLastTo=lastMove&&lastMove.to[0]===r&&lastMove.to[1]===c;
            const isAiFlash=aiFlash&&aiFlash[0]===r&&aiFlash[1]===c;
            const isThreatened=showOverlays&&threatened.has(`${r},${c}`)&&piece?.color==='w'&&!isSel;
            let bg=isLight?'#b8d4e8':'#4a7fa5';
            if(isLastFrom||isLastTo) bg=isLight?'#c8d870':'#8a9830';
            if(isSel) bg='#ff5e9988';
            if(isAiFlash) bg='#ff8c00';
            return (
              <div key={i} onClick={()=>handleSquare(r,c)} style={{width:cellSize,height:cellSize,background:bg,display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',position:'relative',
                outline:isThreatened?`2px solid ${theme.danger}88`:'none',outlineOffset:'-2px'}}>
                {isDest&&!piece&&<div style={{width:'33%',height:'33%',borderRadius:'50%',background:'#ffffff44'}}/>}
                {isDest&&piece&&piece.color==='b'&&<div style={{position:'absolute',inset:2,borderRadius:'50%',border:'3px solid #ffffff55',pointerEvents:'none'}}/>}
                {piece&&<ChessPiece color={piece.color} type={piece.type} size={cellSize} fireGlow={piece.color==='w' && correctStreak >= 3} flameSeed={r * 8 + c}/>}
                <ChessSquareCoordinateLabels r={r} c={c} isLight={isLight} />
              </div>
            );
          })}
          {reversing&&<div style={{position:'absolute',inset:0,zIndex:20,background:'#3d8ef533',border:'3px solid #3d8ef5',borderRadius:6,display:'flex',alignItems:'center',justifyContent:'center',pointerEvents:'none'}}><span style={{fontFamily:theme.fontMono,fontSize:13,color:'#3d8ef5',letterSpacing:2,fontWeight:700,background:'#0a0a1299',padding:'4px 10px',borderRadius:4}}>↩ REVERSING</span></div>}
          {/* Threat arrows */}
          {showOverlays&&threatArrows.length>0&&(
            <svg style={{position:'absolute',inset:0,width:'100%',height:'100%',pointerEvents:'none',zIndex:15}} viewBox={`0 0 ${cellSize*8} ${cellSize*8}`}>
              <defs>
                <marker id="arrowRedSF" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto"><path d="M0,0 L0,6 L6,3 z" fill={theme.danger + 'dd'}/></marker>
                <marker id="arrowOrangeSF" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto"><path d="M0,0 L0,6 L6,3 z" fill={theme.gold + 'dd'}/></marker>
              </defs>
              {threatArrows.map((a,i)=>{
                const fx=(a.from[1]+0.5)*cellSize,fy=(a.from[0]+0.5)*cellSize;
                const tx=(a.to[1]+0.5)*cellSize,ty=(a.to[0]+0.5)*cellSize;
                const dx=tx-fx,dy=ty-fy,len=Math.sqrt(dx*dx+dy*dy);
                const ux=dx/len,uy=dy/len,pad=cellSize*0.3;
                const color=a.type==='hanging'?theme.gold+'d9':theme.danger+'d9';
                const marker=a.type==='hanging'?'url(#arrowOrangeSF)':'url(#arrowRedSF)';
                return <line key={i} x1={fx+ux*pad} y1={fy+uy*pad} x2={tx-ux*pad} y2={ty-uy*pad} stroke={color} strokeWidth={cellSize*0.08} markerEnd={marker} strokeLinecap="round" style={{filter:`drop-shadow(0 0 3px ${color})`,opacity:0.9}}/>;
              })}
            </svg>
          )}
        </div>

        {/* Hint button */}
        {turn==='w'&&!gameOver&&(
          <div style={{display:'flex',gap:8,alignItems:'center',flexWrap:'wrap',justifyContent:'center',padding:'8px 0'}}>
            <button onClick={getHintSF} disabled={hintLoading||!sfReady} style={{background:hintLoading?'#7dd3fc':'none',border:`1px solid ${hintLoading?'#bae6fd':C}`,color:hintLoading?'#082f49':C,borderRadius:8,padding:'6px 14px',fontSize:12,cursor:hintLoading?'wait':'pointer',fontFamily:theme.fontBody,fontWeight:700,opacity:sfReady?1:0.5,boxShadow:hintLoading?'0 0 14px rgba(125,211,252,0.35)':'none',display:'inline-flex',alignItems:'center',gap:6}}>
              {hintLoading ? 'COMPUTING BEST IDEA' : <><PixelBolt size={13} /> Hint</>}
            </button>
          </div>
        )}
        {hint&&<div style={{fontFamily:theme.fontMono,fontSize:11,color:C,textAlign:'center',padding:'4px 12px',background:C+'18',borderRadius:8,border:`1px solid ${C}33`}}>
          <div style={{fontWeight:700,marginBottom:2}}>{hint.label}</div>
          <div style={{opacity:0.85,display:'inline-flex',alignItems:'center',justifyContent:'center',gap:5}}><PixelBolt size={12} /> {hint.reason}</div>
        </div>}
        {(msg||coachMsg)&&<div style={{textAlign:'center',fontFamily:theme.fontMono,fontSize:11,color:msg?theme.gold:C,padding:'4px 12px',background:'rgba(0,0,0,0.3)',borderRadius:8}}>{msg||coachMsg}</div>}
        {streakFlash&&<div style={{position:'fixed',inset:0,zIndex:200,pointerEvents:'none',display:'flex',alignItems:'center',justifyContent:'center'}}><div style={{fontFamily:theme.fontMono,fontSize:22,fontWeight:700,color:theme.gold,letterSpacing:3,textShadow:`0 0 20px ${theme.gold}`,background:'rgba(0,0,0,0.6)',padding:'12px 24px',borderRadius:12,border:`2px solid ${theme.gold}66`}}>🔥 {correctStreak} WORD STREAK!</div></div>}
      </div>

      {/* Word review */}
      {showWordReview&&ReactDOM.createPortal(
        <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.85)',zIndex:300,display:'flex',alignItems:'flex-end',justifyContent:'center'}} onClick={()=>setShowWordReview(false)}>
          <div onClick={e=>e.stopPropagation()} style={{background:theme.surface,borderRadius:'16px 16px 0 0',border:`1.5px solid ${C}44`,borderBottom:'none',width:'100%',maxWidth:600,maxHeight:'80vh',display:'flex',flexDirection:'column'}}>
            <div style={{padding:'18px 20px 12px',borderBottom:`1px solid ${theme.border}`,display:'flex',alignItems:'center',justifyContent:'space-between',flexShrink:0}}>
              <div>
                <div style={{fontFamily:theme.fontMono,fontSize:12,fontWeight:700,color:C,letterSpacing:2}}>📖 WORDS THIS GAME</div>
                <div style={{fontSize:11,color:theme.textMuted,marginTop:3}}>{wordsThisGame.length} words</div>
              </div>
              <div style={{display:'flex',gap:8}}>
                <button onClick={newGame} style={{background:C+'22',border:`1px solid ${C}55`,color:C,borderRadius:8,padding:'7px 14px',fontSize:12,cursor:'pointer',fontFamily:theme.fontBody,fontWeight:600}}>New Game</button>
                <button onClick={()=>setShowWordReview(false)} style={{background:'none',border:`1px solid ${theme.border}`,color:theme.textMuted,borderRadius:8,padding:'7px 12px',fontSize:13,cursor:'pointer'}}>✕</button>
              </div>
            </div>
            <div style={{overflowY:'auto',padding:'12px 20px 24px',display:'flex',flexDirection:'column',gap:10}}>
              {wordsThisGame.map(({word,def,piece,correct},i)=>(
                <div key={i} style={{background:theme.bg,borderRadius:10,padding:'12px 14px',border:`1px solid ${correct?theme.success+'44':theme.danger+'44'}`}}>
                  <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:4}}>
                    <span style={{fontFamily:theme.fontMono,fontWeight:700,fontSize:14,color:correct?theme.success:'#fff',letterSpacing:1}}>{word}</span>
                    <span style={{fontSize:10,color:theme.textMuted}}>captured {PIECE_NAMES[piece]}</span>
                    <span style={{marginLeft:'auto',fontSize:12}}>{correct?'✓':'✗'}</span>
                  </div>
                  <div style={{fontSize:12,color:theme.textMuted,lineHeight:1.5}}>{def}</div>
                </div>
              ))}
            </div>
          </div>
        </div>,
        document.body
      )}

      <ExplodeSVG />
    </div>
  );
}

// ─── APP ROOT ─────────────────────────────────────────────────────────────────
function App() {
  const [screen, setScreen] = useState("home");
  const [onboarded, setOnboarded] = React.useState(() => !!localStorage.getItem('satarcade_onboarded'));
  const [profile, setProfile] = useState(() => localStorage.getItem('satarcade_profile') || 'sat');
  const activeWords = WORD_BANK.filter(w => profile === 'sat' ? w.tier <= 3 : true);

  // Word mastery: { word: { count: N, games: Set } } — mastered = count>=3 AND games.size>=2
  const [wordStats, setWordStats] = useState(() => {
    try {
      const saved = JSON.parse(localStorage.getItem('word_stats') || '{}');
      // Revive games: stored as arrays in JSON, need to be Sets in memory
      const revived = {};
      Object.entries(saved).forEach(([word, v]) => {
        revived[word] = {
          count: v.count || 0,
          games: new Set(Array.isArray(v.games) ? v.games : []),
        };
      });
      return revived;
    } catch(e) { return {}; }
  });

  const isMastered = (stats) => stats && stats.count >= 3 && stats.games.size >= 2;
  const mastered = new Set(Object.entries(wordStats).filter(([,v]) => isMastered(v)).map(([k]) => k));

  const [masteryToast, setMasteryToast] = useState(null);
  const [finalBoss, setFinalBoss] = useState(null); // { word, entry }
  const toastTimer = React.useRef(null);

  const showMasteryToast = (word) => {
    if (toastTimer.current) clearTimeout(toastTimer.current);
    setMasteryToast(word);
  };

  // Build the final self-graded mastery challenge
  const buildFinalBossChallenge = (word) => {
    const entry = activeWords.find(w => w.word === word);
    if (!entry || !entry.example) return null;
    return { word, entry };
  };

  const markCorrect = (word, game) => {
    if (!word || !game) return;
    setWordStats(prev => {
      const entry = prev[word] || { count: 0, games: new Set() };
      const wasMastered = isMastered(entry);
      const newGames = new Set(entry.games);
      newGames.add(game);
      const newEntry = { count: entry.count + 1, games: newGames };
      const nowMastered = isMastered(newEntry);
      if (!wasMastered && nowMastered) {
        setTimeout(() => {
          const boss = buildFinalBossChallenge(word);
          if (boss) setFinalBoss(boss);
          else showMasteryToast(word);
        }, 400);
      }
      const next = { ...prev, [word]: newEntry };
      try {
        const serializable = {};
        Object.entries(next).forEach(([k, v]) => { serializable[k] = { count: v.count, games: [...v.games] }; });
        localStorage.setItem('word_stats', JSON.stringify(serializable));
      } catch(e) {}
      return next;
    });
  };

  if (!onboarded) return <OnboardingScreen onDone={(chosenProfile) => {
    localStorage.setItem('satarcade_onboarded', '1');
    localStorage.setItem('satarcade_profile', chosenProfile || 'sat');
    setProfile(chosenProfile || 'sat');
    setOnboarded(true);
  }} />;

  return (
    <>
      <style>{globalStyle}</style>
      <div style={{ minHeight: "100vh", background: theme.bg }}>
        <div style={{ position: "fixed", inset: 0, pointerEvents: "none", overflow: "hidden", zIndex: 0 }}>
          <div style={{ position: "absolute", top: "10%", left: "5%", width: 400, height: 400, borderRadius: "50%", background: `radial-gradient(circle, ${theme.accent}12 0%, transparent 70%)`, filter: "blur(60px)" }} />
          <div style={{ position: "absolute", bottom: "15%", right: "5%", width: 350, height: 350, borderRadius: "50%", background: `radial-gradient(circle, ${theme.gold}10 0%, transparent 70%)`, filter: "blur(50px)" }} />
        </div>
        <div style={{ position: "relative", zIndex: 1 }}>
          {screen === "home" && <HomeScreen onSelect={setScreen} mastered={mastered} wordStats={wordStats} activeWords={activeWords} profile={profile} setProfile={setProfile} />}
	          {screen === "stats" && <StatsScreen onBack={() => setScreen("home")} mastered={mastered} wordStats={wordStats} activeWords={activeWords} profile={profile} onTestFinalBoss={(boss) => setFinalBoss(boss)} onTestMastery={showMasteryToast} onReset={() => {
            localStorage.clear();
            window.location.reload();
          }} />}
          {screen === "hangman" && <HangmanGame onBack={() => setScreen("home")} onCorrect={w => markCorrect(w, "hangman")} wordBank={activeWords} />}
          {screen === "crossword" && <FreeformCrossword onBack={() => setScreen("home")} onCorrect={w => markCorrect(w, "crossword")} wordBank={activeWords} />}
          {screen === "detective" && <WordDetective onBack={() => setScreen("home")} onCorrect={w => markCorrect(w, "detective")} wordBank={activeWords} />}
          {screen === "oddoneout" && <OddOneOut onBack={() => setScreen("home")} onCorrect={w => markCorrect(w, "oddoneout")} wordBank={activeWords} />}
          {screen === "eartrainer" && <EarTrainer onBack={() => setScreen("home")} onCorrect={w => markCorrect(w, "eartrainer")} wordBank={activeWords} />}
          {screen === "chess" && <VocabChess onBack={() => setScreen("home")} onCorrect={w => markCorrect(w, "chess")} wordBank={activeWords} />}
        </div>
      </div>
      {/* Final Boss modal */}
      {finalBoss && ReactDOM.createPortal(
        <FinalBossModal
          word={finalBoss.word}
          entry={finalBoss.entry}
          onDone={(correct) => {
            if (correct) {
              setFinalBoss(null);
              showMasteryToast(finalBoss.word);
            } else {
              // Revert the word back to just-below-mastery so they get another shot
              setWordStats(prev => {
                const entry = prev[finalBoss.word];
                if (!entry) return prev;
                const next = { ...prev, [finalBoss.word]: { count: entry.count - 1, games: entry.games } };
                try {
                  const serializable = {};
                  Object.entries(next).forEach(([k, v]) => { serializable[k] = { count: v.count, games: [...v.games] }; });
                  localStorage.setItem('word_stats', JSON.stringify(serializable));
                } catch(e) {}
                return next;
              });
              setFinalBoss(null);
            }
          }}
          onSkip={() => { setFinalBoss(null); showMasteryToast(finalBoss.word); }}
        />,
        document.body
      )}
      {/* Mastery popup */}
      {masteryToast && ReactDOM.createPortal(
        <MasteryToast word={masteryToast} onClose={() => setMasteryToast(null)} />,
        document.body
      )}
    </>
  );
}

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
</script>
</body>
</html>
